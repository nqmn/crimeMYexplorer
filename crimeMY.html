<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malaysia Crime Data Visualization</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Leaflet Map CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        #map { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 0; background: #e5e7eb; }
        
        /* Custom scrollbar for control panel */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .legend-color-box {
            display: inline-block;
            width: 16px;
            height: 16px;
            margin-right: 8px;
            border-radius: 3px;
            vertical-align: middle;
            border: 1px solid rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="font-sans text-gray-800">

    <!-- Map Container -->
    <div id="map"></div>
    
    <!-- UI Overlay: Control Panel -->
    <div class="absolute top-4 left-4 sm:top-6 sm:left-6 z-[1000] w-[90%] sm:w-80 max-h-[90vh] overflow-y-auto bg-white/95 backdrop-blur-md p-5 rounded-2xl shadow-2xl border border-gray-100">
        <div class="flex items-center mb-5 gap-3">
            <div class="bg-red-500 p-2 rounded-lg text-white">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
            </div>
            <h2 class="text-xl font-extrabold text-gray-900 tracking-tight">Crime Map <span class="font-light text-gray-500">MY</span></h2>
        </div>
        
        <!-- File Upload -->
        <div class="mb-5">
            <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">1. Load Dataset</label>
            
            <!-- API Fetch Button -->
            <button id="fetchApiBtn" class="w-full mb-3 flex items-center justify-center gap-2 bg-red-600 hover:bg-red-700 text-white font-semibold py-2 px-4 rounded-xl shadow-sm transition-colors text-sm">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
                Fetch Live API Data
            </button>

            <div class="flex items-center gap-3 mb-3">
                <div class="h-px bg-gray-200 flex-1"></div>
                <span class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">OR</span>
                <div class="h-px bg-gray-200 flex-1"></div>
            </div>

            <!-- CSV Upload Fallback -->
            <div class="relative flex items-center justify-center w-full">
                <label for="csvFileInput" class="flex flex-col items-center justify-center w-full h-20 border-2 border-dashed border-gray-300 rounded-xl cursor-pointer bg-gray-50 hover:bg-red-50 hover:border-red-300 transition-all">
                    <div class="flex flex-col items-center justify-center pt-4 pb-4">
                        <p class="text-sm text-gray-500" id="uploadLabel"><span class="font-semibold text-red-600">Click to upload</span> CSV file</p>
                    </div>
                    <input id="csvFileInput" type="file" accept=".csv" class="hidden" />
                </label>
            </div>
        </div>

        <!-- Filters -->
        <div class="space-y-4">
            <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">2. Map Filters</label>
            
            <div>
                <label class="block text-xs font-medium text-gray-700 mb-1">View Level</label>
                <select id="levelFilter" class="w-full rounded-lg border-gray-200 bg-gray-50 shadow-inner focus:border-red-500 focus:ring-red-500 text-sm p-2.5 outline-none transition cursor-pointer">
                    <option value="state">States</option>
                    <option value="district">Districts</option>
                </select>
            </div>
            
            <div>
                <div class="flex justify-between items-center mb-2">
                    <label class="block text-xs font-medium text-gray-700">Year</label>
                    <span id="yearDisplay" class="text-xs font-bold text-red-600 bg-red-50 px-2 py-0.5 rounded shadow-sm border border-red-100">Waiting...</span>
                </div>
                <input type="range" id="yearSlider" min="0" max="0" value="0" disabled
                       class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-red-500 disabled:opacity-50">
                <div class="flex justify-between text-[10px] text-gray-400 mt-1 px-1 font-medium" id="yearTicks">
                    <span>-</span>
                </div>
            </div>

            <div>
                <label class="block text-xs font-medium text-gray-700 mb-1">Crime Category</label>
                <select id="categoryFilter" class="w-full rounded-lg border-gray-200 bg-gray-50 shadow-inner focus:border-red-500 focus:ring-red-500 text-sm p-2.5 outline-none transition cursor-pointer disabled:opacity-50">
                    <option value="All">Waiting for data...</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-medium text-gray-700 mb-1">Crime Type</label>
                <select id="typeFilter" class="w-full rounded-lg border-gray-200 bg-gray-50 shadow-inner focus:border-red-500 focus:ring-red-500 text-sm p-2.5 outline-none transition cursor-pointer disabled:opacity-50">
                    <option value="All">Waiting for data...</option>
                </select>
            </div>
        </div>

        <!-- Did You Know Banner (Inside Control Panel) -->
        <div id="factBanner" class="mt-6 p-4 bg-yellow-50 rounded-xl border border-yellow-200 hidden cursor-pointer hover:bg-yellow-100 transition-colors group relative overflow-hidden">
            <div class="absolute -right-4 -top-4 text-yellow-200 opacity-50 group-hover:rotate-12 transition-transform">
                <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a7 7 0 0 0-7 7c0 2.38 1.19 4.47 3 5.74V17a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1v-2.26c1.81-1.27 3-3.36 3-5.74a7 7 0 0 0-7-7M9 21a1 1 0 0 0 1 1h4a1 1 0 0 0 1-1v-1H9v1Z"/></svg>
            </div>
            <div class="relative z-10">
                <div class="flex items-center gap-2 mb-1.5">
                    <svg class="text-yellow-600" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.9 1.2 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>
                    <span class="text-xs font-bold text-yellow-800 uppercase tracking-wider">Did you know?</span>
                </div>
                <p id="factText" class="text-[13px] text-yellow-900 leading-snug">
                    <!-- Fact goes here -->
                </p>
                <div class="mt-2 text-[10px] text-yellow-600/80 font-medium flex items-center gap-1">
                    <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                    Click to refresh fact
                </div>
            </div>
        </div>

        <div class="mt-4 p-3 bg-blue-50 rounded-lg text-[10px] sm:text-xs text-blue-700 leading-tight">
            <strong class="block mb-1">Note:</strong> Data visualizations match standard geographical bounds. Granular specific districts might be clustered to standard state lines.
        </div>
    </div>

    <!-- UI Overlay: Legend -->
    <div id="legendContainer" class="absolute bottom-6 right-6 z-[1000] bg-white/95 backdrop-blur-md p-4 rounded-xl shadow-xl border border-gray-100 hidden">
        <!-- Legend populated by JS -->
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-gray-900 text-white px-5 py-3 rounded-lg shadow-2xl hidden z-[2000] text-sm font-medium transition-all opacity-0 flex items-center gap-2">
        <span id="toastMsg">Notification message</span>
    </div>

    <!-- External Libraries -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <script>
        // --- State Management ---
        let rawData = [];
        let stateGeojson = null;
        let districtGeojson = null;
        let map = null;
        let geojsonLayer = null;
        let availableYears = ['All'];

        let filters = {
            level: 'state', // Default to state for clearer macroscopic view first
            year: 'All',
            category: 'All',
            type: 'All'
        };

        // --- Initialization ---
        async function init() {
            // Initialize Leaflet Map
            map = L.map('map', { zoomControl: false }).setView([4.2105, 101.9758], 6);
            L.control.zoom({ position: 'topright' }).addTo(map);

            // Clean CartoDB Voyager Basemap
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
                subdomains: 'abcd',
                maxZoom: 20
            }).addTo(map);

            showToast("Fetching administrative boundaries...");

            // Fetch external GeoJSON polygons for Malaysia
            try {
                const [stateRes, distRes] = await Promise.all([
                    fetch('https://raw.githubusercontent.com/nullifye/malaysia.geojson/master/malaysia.state.geojson'),
                    fetch('https://raw.githubusercontent.com/nullifye/malaysia.geojson/master/malaysia.district.geojson')
                ]);
                
                if (stateRes.ok) stateGeojson = await stateRes.json();
                else showToast("Warning: Could not fetch State boundaries.");
                
                if (distRes.ok) districtGeojson = await distRes.json();
                else showToast("Warning: Could not fetch District boundaries.");
                
                updateMap(); // Draw empty states map
            } catch (err) {
                console.error(err);
                showToast("Failed to load map boundaries. Please check your connection.");
            }
        }

        // --- UI Interactions ---
        function showToast(msg, duration = 4000) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').textContent = msg;
            toast.classList.remove('hidden');
            // Small timeout to allow display:block to apply before animating opacity
            setTimeout(() => { toast.classList.remove('opacity-0'); }, 10);
            
            setTimeout(() => {
                toast.classList.add('opacity-0');
                setTimeout(() => toast.classList.add('hidden'), 300);
            }, duration);
        }

        ['level', 'category', 'type'].forEach(f => {
            document.getElementById(f + 'Filter').addEventListener('change', (e) => {
                filters[f] = e.target.value;
                updateMap();
            });
        });

        document.getElementById('yearSlider').addEventListener('input', (e) => {
            const idx = parseInt(e.target.value);
            filters.year = availableYears[idx];
            document.getElementById('yearDisplay').textContent = filters.year === 'All' ? 'All Years' : filters.year;
            updateMap();
        });

        // --- Data Parsing ---
        
        // API Fetch Logic
        document.getElementById('fetchApiBtn').addEventListener('click', async () => {
            const btn = document.getElementById('fetchApiBtn');
            const originalHtml = btn.innerHTML;
            
            try {
                showToast("Fetching live data from data.gov.my...");
                btn.disabled = true;
                btn.innerHTML = `<svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Loading Data...`;
                
                const response = await fetch('https://api.data.gov.my/data-catalogue/?id=crime_district');
                if (!response.ok) throw new Error("API response error");
                
                const jsonRes = await response.json();
                
                // Extract array from the JSON response depending on the API's return structure
                if (jsonRes && jsonRes.data && Array.isArray(jsonRes.data)) {
                    rawData = jsonRes.data;
                } else if (Array.isArray(jsonRes)) {
                    rawData = jsonRes;
                } else {
                    throw new Error("Invalid data format returned");
                }
                
                document.getElementById('uploadLabel').innerHTML = `Using <span class="font-bold text-red-600">Live API Data</span>`;
                populateFilters();
                updateMap();
                displayRandomFact();
                showToast("Live dataset successfully loaded!");
                
            } catch (err) {
                console.error(err);
                showToast("Failed to fetch API data. Please try uploading the CSV.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalHtml;
            }
        });

        // Local File Parsing Logic
        document.getElementById('csvFileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if(!file) return;
            
            document.getElementById('uploadLabel').innerHTML = `File loaded: <span class="font-bold text-gray-800">${file.name}</span>`;
            showToast("Processing dataset...");

            Papa.parse(file, {
                header: true,
                dynamicTyping: true,
                skipEmptyLines: true,
                complete: function(results) {
                    rawData = results.data;
                    populateFilters();
                    updateMap();
                    displayRandomFact();
                    showToast("Dataset successfully applied to map!");
                },
                error: function(err) {
                    showToast("Error reading CSV file.");
                    console.error(err);
                }
            });
        });

        function populateFilters() {
            const years = new Set();
            const categories = new Set();
            const types = new Set();

            rawData.forEach(row => {
                // Extract Year from Date (format "YYYY-MM-DD")
                if (row.date) {
                    const dateStr = String(row.date);
                    if(dateStr.length >= 4) {
                        const yr = dateStr.substring(0, 4);
                        if (!isNaN(yr)) years.add(yr);
                        row.year = yr; 
                    }
                }
                if (row.category) categories.add(row.category);
                if (row.type) types.add(row.type);
            });

            const fillSelect = (id, items) => {
                const selectElem = document.getElementById(id);
                selectElem.innerHTML = '<option value="All">All / Total</option>';
                [...items].sort().forEach(item => {
                    if(item !== 'all' && item !== 'All') {
                        const opt = document.createElement('option');
                        opt.value = item;
                        // Format string (e.g., 'theft_vehicle_lorry' -> 'Theft Vehicle Lorry')
                        opt.textContent = item.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
                        selectElem.appendChild(opt);
                    }
                });
                selectElem.removeAttribute('disabled');
            };

            // Setup Year Slider
            const sortedYears = [...years].sort();
            availableYears = ['All', ...sortedYears];
            
            const slider = document.getElementById('yearSlider');
            slider.min = 0;
            slider.max = availableYears.length - 1;
            slider.value = 0;
            slider.disabled = false;
            
            const ticks = document.getElementById('yearTicks');
            if (sortedYears.length > 0) {
                ticks.innerHTML = `<span>All</span><span>${sortedYears[sortedYears.length-1]}</span>`;
            } else {
                ticks.innerHTML = `<span>All</span>`;
            }
            document.getElementById('yearDisplay').textContent = 'All Years';
            filters.year = 'All';

            fillSelect('categoryFilter', categories);
            fillSelect('typeFilter', types);
        }

        // --- Interactive Fact Banner Logic ---
        function formatCrimeType(type) {
            if (!type) return "crimes";
            return type.split('_').join(' ');
        }

        function displayRandomFact() {
            if (!rawData || rawData.length === 0) return;
            
            // Filter down to valid, specific granular rows (no broad 'All' rows or empty counts)
            const validData = rawData.filter(r => 
                r.district && r.district.toLowerCase() !== 'all' && 
                r.type && r.type.toLowerCase() !== 'all' && 
                Number(r.crimes) > 0
            );
            
            if (validData.length === 0) return;

            // Pick a random row
            const row = validData[Math.floor(Math.random() * validData.length)];
            const year = row.year || String(row.date).substring(0, 4);
            const district = row.district;
            const state = row.state;
            const crimes = Number(row.crimes);
            const type = formatCrimeType(row.type);

            const templates = [
                `In ${year}, there were <strong class="font-extrabold text-yellow-950">${crimes}</strong> reported cases of ${type} in <strong>${district}</strong>, ${state}.`,
                `<strong class="font-extrabold text-yellow-950">${district}</strong> recorded <strong>${crimes}</strong> incidents of ${type} in ${year}.`,
                `On average, <strong>${(crimes/12).toFixed(1)}</strong> ${type} cases happened every month in <strong>${district}</strong> during ${year}.`
            ];

            // If occurrences are high enough, compute daily or weekly insights
            if (crimes >= 365) {
                templates.push(`Every day, an average of <strong class="font-extrabold text-yellow-950">${Math.floor(crimes/365)}</strong> ${type} cases happened in <strong>${district}</strong> in ${year}.`);
            } else if (crimes >= 52) {
                templates.push(`Every week, an average of <strong class="font-extrabold text-yellow-950">${Math.floor(crimes/52)}</strong> ${type} cases happened in <strong>${district}</strong> in ${year}.`);
            }

            const text = templates[Math.floor(Math.random() * templates.length)];
            document.getElementById('factText').innerHTML = text;
            
            const banner = document.getElementById('factBanner');
            banner.classList.remove('hidden');
            banner.classList.add('block');
        }

        document.getElementById('factBanner').addEventListener('click', displayRandomFact);

        // Normalize geographical names to allow cross-matching between CSV and GeoJSON
        function normalizeName(name) {
            if (!name) return "";
            return name.toLowerCase()
                .replace(/w\.p\.\s*/g, '')
                .replace(/federal territory of /g, '')
                .replace(/darul\s+[a-z']+/g, '') // Strip honorifics e.g., Darul Ta'zim
                .replace(/pulau pinang/g, 'penang')
                .replace(/[^a-z0-9]/g, ''); // Strip all special chars & spaces
        }

        function getFeatureName(feature) {
            const props = feature.properties;
            // Iterate over common Name properties in standard GeoJSON setups
            for (const key of ['name', 'Name', 'NAME', 'NAME_1', 'NAME_2', 'shapeName', 'nam_daerah']) {
                if (props[key]) return props[key];
            }
            return "Unknown";
        }

        // --- Data Aggregation Logic ---
        function getAggregatedData() {
            let counts = {};

            rawData.forEach(row => {
                // Ignore empty or structural national-level summaries
                if (!row.state || row.state === 'Malaysia') return;
                
                // Avoid double counting generic/broad rows when compiling
                if (row.district === 'All' || row.district === 'all') return; 

                // Process active filters
                if (filters.year !== 'All' && row.year !== filters.year) return;
                if (filters.category !== 'All' && row.category !== filters.category) return;

                // To build an accurate breakdown, we must use granular types and ignore the summary 'all' rows
                if (row.type === 'all' || row.type === 'All') return;

                // If a specific type is selected, filter out others
                if (filters.type !== 'All' && row.type !== filters.type) return;

                // Map target logic
                let nameKey = filters.level === 'state' ? normalizeName(row.state) : normalizeName(row.district);

                if (!counts[nameKey]) counts[nameKey] = { total: 0, types: {} };
                
                let val = Number(row.crimes) || 0;
                counts[nameKey].total += val;
                
                // Track breakdown by crime type
                if (!counts[nameKey].types[row.type]) counts[nameKey].types[row.type] = 0;
                counts[nameKey].types[row.type] += val;
            });

            return counts;
        }

        // --- Rendering Map Elements ---
        function getColor(d, max) {
            if (d === 0) return '#f8fafc'; // Empty / No Data
            return d > max * 0.8 ? '#7f1d1d' : // Red 900
                   d > max * 0.6 ? '#b91c1c' : // Red 700
                   d > max * 0.4 ? '#ef4444' : // Red 500
                   d > max * 0.2 ? '#f87171' : // Red 400
                   d > 0         ? '#fca5a5' : // Red 300
                                   '#fee2e2';  // Red 100
        }

        function updateMap() {
            if (geojsonLayer) map.removeLayer(geojsonLayer);
            
            const geojsonData = filters.level === 'state' ? stateGeojson : districtGeojson;
            if (!geojsonData) return; // Wait until GeoJSON loads

            const counts = getAggregatedData();
            const crimeValues = Object.values(counts).map(c => c.total);
            const maxCrimes = crimeValues.length > 0 ? Math.max(...crimeValues) : 0;

            geojsonLayer = L.geoJSON(geojsonData, {
                style: function(feature) {
                    const name = getFeatureName(feature);
                    const locData = counts[normalizeName(name)] || { total: 0 };
                    const crimeCount = locData.total;
                    return {
                        fillColor: getColor(crimeCount, maxCrimes),
                        weight: filters.level === 'state' ? 1.5 : 1,
                        opacity: 1,
                        color: '#cbd5e1', // Slate 300 border
                        fillOpacity: crimeCount > 0 ? 0.85 : 0.4
                    };
                },
                onEachFeature: function(feature, layer) {
                    const name = getFeatureName(feature);
                    const locData = counts[normalizeName(name)] || { total: 0, types: {} };
                    const crimeCount = locData.total;
                    
                    // Build the breakdown HTML for the tooltip
                    let typesHtml = '';
                    if (crimeCount > 0 && locData.types) {
                        const sortedTypes = Object.entries(locData.types).sort((a, b) => b[1] - a[1]);
                        typesHtml = '<div class="mt-2 border-t border-gray-200 pt-1.5 space-y-0.5">';
                        sortedTypes.forEach(([type, count]) => {
                            const typeName = type.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
                            typesHtml += `
                                <div class="flex justify-between items-center text-[11px]">
                                    <span class="text-gray-500 truncate mr-3 flex-1">${typeName}</span>
                                    <span class="font-medium text-gray-700">${count.toLocaleString()}</span>
                                </div>
                            `;
                        });
                        typesHtml += '</div>';
                    }
                    
                    const tooltipContent = `
                        <div class="px-1 min-w-[160px] max-w-[220px]">
                            <div class="font-bold text-gray-800 text-[14px] border-b border-gray-200 pb-1 mb-1.5 uppercase tracking-wide">
                                ${name}
                            </div>
                            <div class="text-xs text-gray-600 flex justify-between items-center">
                                <span>Total Crimes:</span>
                                <span class="font-bold ${crimeCount > 0 ? 'text-red-600' : 'text-gray-400'} ml-3">
                                    ${crimeCount.toLocaleString()}
                                </span>
                            </div>
                            ${typesHtml}
                        </div>
                    `;
                    
                    layer.bindTooltip(tooltipContent, {
                        direction: 'top',
                        sticky: true,
                        className: 'bg-white/95 backdrop-blur shadow-2xl rounded-lg border border-gray-100 p-2'
                    });
                    
                    // Interaction highlights
                    layer.on({
                        mouseover: function(e) {
                            const l = e.target;
                            l.setStyle({
                                weight: 3,
                                color: '#1e293b', // Highlight edge in Slate 800
                                fillOpacity: 1
                            });
                            l.bringToFront();
                        },
                        mouseout: function(e) {
                            geojsonLayer.resetStyle(e.target);
                        }
                    });
                }
            }).addTo(map);

            updateLegend(maxCrimes);
        }

        function updateLegend(maxCrimes) {
            const container = document.getElementById('legendContainer');
            
            if (maxCrimes === 0) {
                container.classList.add('hidden');
                return;
            }
            container.classList.remove('hidden');

            const grades = [
                0, 
                Math.floor(maxCrimes * 0.2), 
                Math.floor(maxCrimes * 0.4), 
                Math.floor(maxCrimes * 0.6), 
                Math.floor(maxCrimes * 0.8)
            ];
            
            let html = '<h4 class="font-bold text-xs uppercase tracking-wider text-gray-500 mb-3 border-b pb-1">Crime Heatmap</h4><div class="space-y-1.5 text-xs text-gray-700">';
            
            for (let i = 0; i < grades.length; i++) {
                const start = grades[i];
                const end = grades[i + 1];
                
                // For grade 0, use start+1 color to avoid white (empty) color, representing the 1st tier.
                const colorValue = getColor(start + 1, maxCrimes);
                
                html += `
                    <div class="flex items-center">
                        <span class="legend-color-box shadow-sm" style="background:${colorValue}"></span>
                        <span>${start.toLocaleString()} ${end ? '&ndash; ' + end.toLocaleString() : '+'}</span>
                    </div>`;
            }
            
            html += `
                <div class="flex items-center mt-2 pt-2 border-t border-gray-100">
                    <span class="legend-color-box shadow-sm" style="background:#f8fafc"></span>
                    <span class="text-gray-400">No Data / 0</span>
                </div>
            </div>`;
            
            container.innerHTML = html;
        }

        // Start App
        init();
    </script>
</body>
</html>
