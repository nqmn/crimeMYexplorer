<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malaysia Crime Data Visualization</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Leaflet Map CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        #map { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 0; background: #e5e7eb; }
        
        /* Custom scrollbar for control panel */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .legend-color-box {
            display: inline-block;
            width: 16px;
            height: 16px;
            margin-right: 8px;
            border-radius: 3px;
            vertical-align: middle;
            border: 1px solid rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="font-sans text-gray-800">

    <!-- Map Container -->
    <div id="map"></div>
    
    <!-- UI Overlay: Control Panel -->
    <div class="absolute top-4 left-4 sm:top-6 sm:left-6 z-[1000] w-[90%] sm:w-80 max-h-[90vh] overflow-y-auto bg-white/95 backdrop-blur-md p-5 rounded-2xl shadow-2xl border border-gray-100">
        <div class="flex items-center justify-between mb-5 gap-3">
            <div class="flex items-center gap-3">
                <div class="bg-red-500 p-2 rounded-lg text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
                </div>
                <h2 class="text-xl font-extrabold text-gray-900 tracking-tight">Crime Map <span class="font-light text-gray-500">MY</span></h2>
            </div>
            
            <!-- Save Button -->
            <button id="downloadCsvBtn" class="text-gray-500 hover:text-red-600 transition-colors p-2 bg-gray-100 hover:bg-red-50 rounded-lg shadow-sm border border-gray-200" title="Save consolidated dataset as CSV">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
            </button>
        </div>
        
        <!-- File Upload -->
        <div class="mb-5">
            <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">1. Load Dataset</label>
            
            <!-- API Fetch Button -->
            <button id="fetchApiBtn" class="w-full mb-1 flex items-center justify-center gap-2 bg-red-600 hover:bg-red-700 text-white font-semibold py-2 px-4 rounded-xl shadow-sm transition-colors text-sm">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
                Fetch Live API Data
            </button>
        </div>

        <!-- Filters -->
        <div class="space-y-4">
            <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">2. Map Filters</label>
            
            <div>
                <label class="block text-xs font-medium text-gray-700 mb-1">View Level</label>
                <select id="levelFilter" class="w-full rounded-lg border-gray-200 bg-gray-50 shadow-inner focus:border-red-500 focus:ring-red-500 text-sm p-2.5 outline-none transition cursor-pointer">
                    <option value="state">States</option>
                    <option value="district">Districts</option>
                </select>
            </div>
            
            <div>
                <div class="flex justify-between items-center mb-2">
                    <label class="block text-xs font-medium text-gray-700">Year</label>
                    <span id="yearDisplay" class="text-xs font-bold text-red-600 bg-red-50 px-2 py-0.5 rounded shadow-sm border border-red-100">Waiting...</span>
                </div>
                <input type="range" id="yearSlider" min="0" max="0" value="0" disabled
                       class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-red-500 disabled:opacity-50">
                <div class="flex justify-between text-[10px] text-gray-400 mt-1 px-1 font-medium" id="yearTicks">
                    <span>-</span>
                </div>
            </div>

            <div>
                <label class="block text-xs font-medium text-gray-700 mb-1">Crime Category</label>
                <select id="categoryFilter" class="w-full rounded-lg border-gray-200 bg-gray-50 shadow-inner focus:border-red-500 focus:ring-red-500 text-sm p-2.5 outline-none transition cursor-pointer disabled:opacity-50">
                    <option value="All">Waiting for data...</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-medium text-gray-700 mb-1">Crime Type</label>
                <select id="typeFilter" class="w-full rounded-lg border-gray-200 bg-gray-50 shadow-inner focus:border-red-500 focus:ring-red-500 text-sm p-2.5 outline-none transition cursor-pointer disabled:opacity-50">
                    <option value="All">Waiting for data...</option>
                </select>
            </div>
        </div>

        <!-- Yearly Trend Chart Container -->
        <div id="chartContainer" class="mt-6 hidden">
            <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">3. Yearly Trend</label>
            <div class="p-3 bg-gray-50 border border-gray-200 rounded-xl shadow-inner relative h-40 w-full">
                <canvas id="trendChart"></canvas>
            </div>
        </div>

        <!-- Did You Know Banner -->
        <div id="factBanner" class="mt-6 p-4 bg-yellow-50 rounded-xl border border-yellow-200 hidden cursor-pointer hover:bg-yellow-100 transition-colors group relative overflow-hidden">
            <div class="absolute -right-4 -top-4 text-yellow-200 opacity-50 group-hover:rotate-12 transition-transform">
                <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a7 7 0 0 0-7 7c0 2.38 1.19 4.47 3 5.74V17a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1v-2.26c1.81-1.27 3-3.36 3-5.74a7 7 0 0 0-7-7M9 21a1 1 0 0 0 1 1h4a1 1 0 0 0 1-1v-1H9v1Z"/></svg>
            </div>
            <div class="relative z-10">
                <div class="flex items-center gap-2 mb-1.5">
                    <svg class="text-yellow-600" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.9 1.2 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>
                    <span class="text-xs font-bold text-yellow-800 uppercase tracking-wider">Did you know?</span>
                </div>
                <p id="factText" class="text-[13px] text-yellow-900 leading-snug">
                    <!-- Fact goes here -->
                </p>
                <div class="mt-2 text-[10px] text-yellow-600/80 font-medium flex items-center gap-1">
                    <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                    Click to refresh fact
                </div>
            </div>
        </div>

        <div class="mt-4 p-3 bg-blue-50 rounded-lg text-[10px] sm:text-xs text-blue-700 leading-tight">
            <strong class="block mb-1">Note:</strong> Data visualizations match standard geographical bounds. Granular specific districts might be clustered to standard state lines.
        </div>
    </div>

    <!-- UI Overlay: Legend -->
    <div id="legendContainer" class="absolute bottom-6 right-6 z-[1000] bg-white/95 backdrop-blur-md p-4 rounded-xl shadow-xl border border-gray-100 hidden">
        <!-- Legend populated by JS -->
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-gray-900 text-white px-5 py-3 rounded-lg shadow-2xl hidden z-[2000] text-sm font-medium transition-all opacity-0 flex items-center gap-2">
        <span id="toastMsg">Notification message</span>
    </div>

    <!-- External Libraries -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <!-- Chart.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Turf.js/6.5.0/turf.min.js"></script> <!-- Turf.js for GeoSpatial Math -->

    <script>
        // --- State Management ---
        let rawData = [];
        let stateGeojson = null;
        let districtGeojson = null;
        let map = null;
        let geojsonLayer = null;
        let availableYears = ['All'];
        let trendChart = null; // Chart instance
        
        // Store API Population Data
        let popLookup = { state: {}, district: {} };
        let incomeLookup = { state: {}, district: {} }; // Add Income Data Storage
        let povertyLookup = { state: {}, district: {} }; // Add Poverty Data Storage
        let inequalityLookup = { state: {}, district: {} }; // Add Inequality Data Storage
        let unemploymentLookup = { state: {}, district: {} }; // Add Unemployment Data Storage
        let geoAreaCache = { state: {}, district: {} }; // Store Turf.js Area Calculations

        let filters = {
            level: 'state', // Default to state for clearer macroscopic view first
            year: 'All',
            category: 'All',
            type: 'All'
        };

        // --- Initialization ---
        async function init() {
            // Initialize Leaflet Map
            map = L.map('map', { zoomControl: false }).setView([4.2105, 101.9758], 6);
            L.control.zoom({ position: 'topright' }).addTo(map);

            // Clean CartoDB Voyager Basemap
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
                subdomains: 'abcd',
                maxZoom: 20
            }).addTo(map);

            showToast("Fetching administrative boundaries...");

            // Fetch external GeoJSON polygons for Malaysia
            try {
                const [stateRes, distRes] = await Promise.all([
                    fetch('https://raw.githubusercontent.com/nullifye/malaysia.geojson/master/malaysia.state.geojson'),
                    fetch('https://raw.githubusercontent.com/nullifye/malaysia.geojson/master/malaysia.district.geojson')
                ]);
                
                if (stateRes.ok) stateGeojson = await stateRes.json();
                else showToast("Warning: Could not fetch State boundaries.");
                
                if (distRes.ok) districtGeojson = await distRes.json();
                else showToast("Warning: Could not fetch District boundaries.");
                
                // Pre-calculate areas via Turf.js
                if (stateGeojson) calculateGeoAreas(stateGeojson, 'state');
                if (districtGeojson) calculateGeoAreas(districtGeojson, 'district');
                
                updateMap(); // Draw empty states map
            } catch (err) {
                console.error(err);
                showToast("Failed to load map boundaries. Please check your connection.");
            }
            
            // Fire and forget background fetches
            fetchPopulationData();
            fetchIncomeData();
            fetchPovertyData();
            fetchInequalityData();
            fetchUnemploymentData();
        }

        // Cache square kilometers area for Density calculations
        function calculateGeoAreas(geoJsonData, level) {
            turf.featureEach(geoJsonData, function (currentFeature) {
                const name = normalizeName(getFeatureName(currentFeature));
                if (name) {
                    const areaSqMeters = turf.area(currentFeature);
                    geoAreaCache[level][name] = areaSqMeters / 1000000; // Convert to Sq KM
                }
            });
        }

        async function fetchPopulationData() {
            try {
                const res = await fetch('https://api.data.gov.my/data-catalogue/?id=population_district&limit=100000');
                if (!res.ok) return;
                const json = await res.json();
                const data = json.data || json;
                
                let isThousands = false;
                const maxPop = Math.max(...data.map(d => Number(d.population) || 0));
                if (maxPop < 100000) isThousands = true;

                data.forEach(row => {
                    let yr = row.date ? String(row.date).substring(0, 4) : null;
                    if (!yr || yr < '2016') return; 
                    
                    let st = normalizeName(row.state);
                    let dist = normalizeName(row.district);
                    let pop = Number(row.population) || 0;
                    if (isThousands) pop *= 1000;
                    
                    if (st) {
                        if (!popLookup.state[st]) popLookup.state[st] = {};
                        if (!popLookup.state[st][yr]) popLookup.state[st][yr] = 0;
                        popLookup.state[st][yr] += pop;
                    }
                    if (dist && dist !== 'all') {
                        if (!popLookup.district[dist]) popLookup.district[dist] = {};
                        if (!popLookup.district[dist][yr]) popLookup.district[dist][yr] = 0;
                        popLookup.district[dist][yr] += pop;
                    }
                });
            } catch (err) {
                console.error("Could not fetch population data", err);
            }
        }

        async function fetchIncomeData() {
            try {
                const [distRes, stateRes] = await Promise.all([
                    fetch('https://api.data.gov.my/data-catalogue/?id=hh_income_district&limit=100000'),
                    fetch('https://api.data.gov.my/data-catalogue/?id=hh_income_state&limit=100000')
                ]);
                
                if (distRes.ok) {
                    const json = await distRes.json();
                    const data = json.data || json;
                    data.forEach(row => {
                        let yr = row.date ? String(row.date).substring(0, 4) : null;
                        if (!yr) return;
                        let dist = normalizeName(row.district);
                        let income = Number(row.income_median) || 0;
                        if (income > 0 && dist && dist !== 'all') {
                            if (!incomeLookup.district[dist]) incomeLookup.district[dist] = {};
                            incomeLookup.district[dist][yr] = income;
                        }
                    });
                }

                if (stateRes.ok) {
                    const json = await stateRes.json();
                    const data = json.data || json;
                    data.forEach(row => {
                        let yr = row.date ? String(row.date).substring(0, 4) : null;
                        if (!yr) return;
                        let st = normalizeName(row.state);
                        let income = Number(row.income_median) || 0;
                        if (income > 0 && st) {
                            if (!incomeLookup.state[st]) incomeLookup.state[st] = {};
                            incomeLookup.state[st][yr] = income;
                        }
                    });
                }
            } catch (err) {
                console.error("Could not fetch income data", err);
            }
        }

        async function fetchPovertyData() {
            try {
                const [distRes, stateRes] = await Promise.all([
                    fetch('https://api.data.gov.my/data-catalogue/?id=hh_poverty_district&limit=100000'),
                    fetch('https://api.data.gov.my/data-catalogue/?id=hh_poverty_state&limit=100000')
                ]);
                
                if (distRes.ok) {
                    const json = await distRes.json();
                    const data = json.data || json;
                    data.forEach(row => {
                        let yr = row.date ? String(row.date).substring(0, 4) : null;
                        if (!yr) return;
                        let dist = normalizeName(row.district);
                        let pov = row.poverty_relative !== undefined ? Number(row.poverty_relative) : Number(row.poverty_absolute || row.poverty);
                        if (!isNaN(pov) && dist && dist !== 'all') {
                            if (!povertyLookup.district[dist]) povertyLookup.district[dist] = {};
                            povertyLookup.district[dist][yr] = pov;
                        }
                    });
                }

                if (stateRes.ok) {
                    const json = await stateRes.json();
                    const data = json.data || json;
                    data.forEach(row => {
                        let yr = row.date ? String(row.date).substring(0, 4) : null;
                        if (!yr) return;
                        let st = normalizeName(row.state);
                        let pov = row.poverty_relative !== undefined ? Number(row.poverty_relative) : Number(row.poverty_absolute || row.poverty);
                        if (!isNaN(pov) && st) {
                            if (!povertyLookup.state[st]) povertyLookup.state[st] = {};
                            povertyLookup.state[st][yr] = pov;
                        }
                    });
                }
            } catch (err) {
                console.error("Could not fetch poverty data", err);
            }
        }

        async function fetchInequalityData() {
            try {
                const [distRes, stateRes] = await Promise.all([
                    fetch('https://api.data.gov.my/data-catalogue/?id=hh_inequality_district&limit=100000'),
                    fetch('https://api.data.gov.my/data-catalogue/?id=hh_inequality_state&limit=100000')
                ]);
                
                if (distRes.ok) {
                    const json = await distRes.json();
                    const data = json.data || json;
                    data.forEach(row => {
                        let yr = row.date ? String(row.date).substring(0, 4) : null;
                        if (!yr) return;
                        let dist = normalizeName(row.district);
                        let gini = Number(row.gini);
                        if (!isNaN(gini) && dist && dist !== 'all') {
                            if (!inequalityLookup.district[dist]) inequalityLookup.district[dist] = {};
                            inequalityLookup.district[dist][yr] = gini;
                        }
                    });
                }

                if (stateRes.ok) {
                    const json = await stateRes.json();
                    const data = json.data || json;
                    data.forEach(row => {
                        let yr = row.date ? String(row.date).substring(0, 4) : null;
                        if (!yr) return;
                        let st = normalizeName(row.state);
                        let gini = Number(row.gini);
                        if (!isNaN(gini) && st) {
                            if (!inequalityLookup.state[st]) inequalityLookup.state[st] = {};
                            inequalityLookup.state[st][yr] = gini;
                        }
                    });
                }
            } catch (err) {
                console.error("Could not fetch inequality data", err);
            }
        }

        async function fetchUnemploymentData() {
            try {
                const [distRes, stateRes] = await Promise.all([
                    fetch('https://api.data.gov.my/data-catalogue/?id=lfs_district&limit=100000'),
                    fetch('https://api.data.gov.my/data-catalogue/?id=lfs_state&limit=100000')
                ]);
                
                if (distRes.ok) {
                    const json = await distRes.json();
                    const data = json.data || json;
                    data.forEach(row => {
                        let yr = row.date ? String(row.date).substring(0, 4) : null;
                        if (!yr) return;
                        let dist = normalizeName(row.district);
                        let uRate = row.u_rate !== undefined ? Number(row.u_rate) : Number(row.unemployment_rate);
                        if (!isNaN(uRate) && dist && dist !== 'all') {
                            if (!unemploymentLookup.district[dist]) unemploymentLookup.district[dist] = {};
                            unemploymentLookup.district[dist][yr] = uRate;
                        }
                    });
                }

                if (stateRes.ok) {
                    const json = await stateRes.json();
                    const data = json.data || json;
                    data.forEach(row => {
                        let yr = row.date ? String(row.date).substring(0, 4) : null;
                        if (!yr) return;
                        let st = normalizeName(row.state);
                        let uRate = row.u_rate !== undefined ? Number(row.u_rate) : Number(row.unemployment_rate);
                        if (!isNaN(uRate) && st) {
                            if (!unemploymentLookup.state[st]) unemploymentLookup.state[st] = {};
                            unemploymentLookup.state[st][yr] = uRate;
                        }
                    });
                }
            } catch (err) {
                console.error("Could not fetch unemployment data", err);
            }
        }

        // --- UI Interactions ---
        function showToast(msg, duration = 4000) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').textContent = msg;
            toast.classList.remove('hidden');
            setTimeout(() => { toast.classList.remove('opacity-0'); }, 10);
            
            setTimeout(() => {
                toast.classList.add('opacity-0');
                setTimeout(() => toast.classList.add('hidden'), 300);
            }, duration);
        }

        ['level', 'category', 'type'].forEach(f => {
            document.getElementById(f + 'Filter').addEventListener('change', (e) => {
                filters[f] = e.target.value;
                updateMap();
            });
        });

        document.getElementById('yearSlider').addEventListener('input', (e) => {
            const idx = parseInt(e.target.value);
            filters.year = availableYears[idx];
            document.getElementById('yearDisplay').textContent = filters.year === 'All' ? 'All Years' : filters.year;
            updateMap();
        });

        // --- Data Parsing ---
        
        // API Fetch Logic
        document.getElementById('fetchApiBtn').addEventListener('click', async () => {
            const btn = document.getElementById('fetchApiBtn');
            let originalHtml = btn.innerHTML;
            
            try {
                showToast("Fetching live data from data.gov.my...");
                btn.disabled = true;
                btn.innerHTML = `<svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Loading Data...`;
                
                const response = await fetch('https://api.data.gov.my/data-catalogue/?id=crime_district');
                if (!response.ok) throw new Error("API response error");
                
                const jsonRes = await response.json();
                
                if (jsonRes && jsonRes.data && Array.isArray(jsonRes.data)) {
                    rawData = jsonRes.data;
                } else if (Array.isArray(jsonRes)) {
                    rawData = jsonRes;
                } else {
                    throw new Error("Invalid data format returned");
                }
                
                // Update button to show success state
                originalHtml = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg> Live Data Loaded`;
                btn.classList.replace('bg-red-600', 'bg-green-600');
                btn.classList.replace('hover:bg-red-700', 'hover:bg-green-700');

                populateFilters();
                updateMap();
                displayRandomFact();
                showToast("Live dataset successfully loaded!");
                
            } catch (err) {
                console.error(err);
                showToast("Failed to fetch API data. Please try again later.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalHtml;
            }
        });

        function populateFilters() {
            const years = new Set();
            const categories = new Set();
            const types = new Set();

            rawData.forEach(row => {
                if (row.date) {
                    const dateStr = String(row.date);
                    if(dateStr.length >= 4) {
                        const yr = dateStr.substring(0, 4);
                        if (!isNaN(yr)) years.add(yr);
                        row.year = yr; 
                    }
                }
                if (row.category) categories.add(row.category);
                if (row.type) types.add(row.type);
            });

            const fillSelect = (id, items) => {
                const selectElem = document.getElementById(id);
                selectElem.innerHTML = '<option value="All">All / Total</option>';
                [...items].sort().forEach(item => {
                    if(item !== 'all' && item !== 'All') {
                        const opt = document.createElement('option');
                        opt.value = item;
                        opt.textContent = item.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
                        selectElem.appendChild(opt);
                    }
                });
                selectElem.removeAttribute('disabled');
            };

            const sortedYears = [...years].sort();
            availableYears = ['All', ...sortedYears];
            
            const slider = document.getElementById('yearSlider');
            slider.min = 0;
            slider.max = availableYears.length - 1;
            slider.value = 0;
            slider.disabled = false;
            
            const ticks = document.getElementById('yearTicks');
            if (sortedYears.length > 0) {
                ticks.innerHTML = `<span>All</span><span>${sortedYears[sortedYears.length-1]}</span>`;
            } else {
                ticks.innerHTML = `<span>All</span>`;
            }
            document.getElementById('yearDisplay').textContent = 'All Years';
            filters.year = 'All';

            fillSelect('categoryFilter', categories);
            fillSelect('typeFilter', types);
            
            document.getElementById('chartContainer').classList.remove('hidden');
        }

        // --- Interactive Fact Banner Logic ---
        function formatCrimeType(type) {
            if (!type) return "crimes";
            return type.split('_').join(' ');
        }

        function displayRandomFact() {
            if (!rawData || rawData.length === 0) return;
            
            const validData = rawData.filter(r => 
                r.district && r.district.toLowerCase() !== 'all' && 
                r.type && r.type.toLowerCase() !== 'all' && 
                Number(r.crimes) > 0
            );
            
            if (validData.length === 0) return;

            const row = validData[Math.floor(Math.random() * validData.length)];
            const year = row.year || String(row.date).substring(0, 4);
            const district = row.district;
            const state = row.state;
            const crimes = Number(row.crimes);
            const type = formatCrimeType(row.type);

            const templates = [
                `In ${year}, there were <strong class="font-extrabold text-yellow-950">${crimes}</strong> reported cases of ${type} in <strong>${district}</strong>, ${state}.`,
                `<strong class="font-extrabold text-yellow-950">${district}</strong> recorded <strong>${crimes}</strong> incidents of ${type} in ${year}.`,
                `On average, <strong>${(crimes/12).toFixed(1)}</strong> ${type} cases happened every month in <strong>${district}</strong> during ${year}.`
            ];

            if (crimes >= 365) {
                templates.push(`Every day, an average of <strong class="font-extrabold text-yellow-950">${Math.floor(crimes/365)}</strong> ${type} cases happened in <strong>${district}</strong> in ${year}.`);
            } else if (crimes >= 52) {
                templates.push(`Every week, an average of <strong class="font-extrabold text-yellow-950">${Math.floor(crimes/52)}</strong> ${type} cases happened in <strong>${district}</strong> in ${year}.`);
            }

            const text = templates[Math.floor(Math.random() * templates.length)];
            document.getElementById('factText').innerHTML = text;
            
            const banner = document.getElementById('factBanner');
            banner.classList.remove('hidden');
            banner.classList.add('block');
        }

        document.getElementById('factBanner').addEventListener('click', displayRandomFact);

        // --- Consolidated Dataset Download Logic ---
        document.getElementById('downloadCsvBtn').addEventListener('click', () => {
            if (!rawData || rawData.length === 0) {
                showToast("No data available. Please load a dataset first.");
                return;
            }

            showToast("Generating consolidated dataset...");

            const getClosestData = (lookup, locationName, targetYear) => {
                if (!lookup || !lookup[locationName]) return '';
                if (lookup[locationName][targetYear] !== undefined) return lookup[locationName][targetYear];
                
                const availableYrs = Object.keys(lookup[locationName]).sort().reverse();
                if (availableYrs.length === 0) return '';
                let targetYrNum = parseInt(targetYear) || 9999;
                let closestYr = availableYrs.find(y => parseInt(y) <= targetYrNum) || availableYrs[0];
                return lookup[locationName][closestYr] !== undefined ? lookup[locationName][closestYr] : '';
            };

            const exportData = rawData.map(row => {
                const yr = row.year || (row.date ? String(row.date).substring(0, 4) : '');
                const normSt = normalizeName(row.state);
                const normDist = normalizeName(row.district);
                
                let pop = '', inc = '', pov = '', gini = '', uRate = '', areaKm2 = '', popDensity = '';

                if (normDist && normDist !== 'all') {
                    pop = getClosestData(popLookup.district, normDist, yr);
                    inc = getClosestData(incomeLookup.district, normDist, yr);
                    pov = getClosestData(povertyLookup.district, normDist, yr);
                    gini = getClosestData(inequalityLookup.district, normDist, yr);
                    uRate = getClosestData(unemploymentLookup.district, normDist, yr);
                    areaKm2 = geoAreaCache.district[normDist] || '';
                } else if (normSt) {
                    pop = getClosestData(popLookup.state, normSt, yr);
                    inc = getClosestData(incomeLookup.state, normSt, yr);
                    pov = getClosestData(povertyLookup.state, normSt, yr);
                    gini = getClosestData(inequalityLookup.state, normSt, yr);
                    uRate = getClosestData(unemploymentLookup.state, normSt, yr);
                    areaKm2 = geoAreaCache.state[normSt] || '';
                }

                if (pop && areaKm2) {
                    popDensity = (pop / areaKm2).toFixed(1);
                }

                // Calculate Crime Rate per 100k
                let crimeRate = '';
                let crimes = Number(row.crimes) || 0;
                if (pop > 0) {
                    crimeRate = ((crimes / pop) * 100000).toFixed(1);
                }

                // Calculate Socioeconomic Risk Score
                let riskScore = '';
                if (inc !== '' && pov !== '') {
                    let incRisk = (1 - (Math.min(Math.max(inc, 2500), 12500) - 2500) / 10000) * 10;
                    let povRisk = (Math.min(Math.max(pov, 0), 25) / 25) * 10;
                    let safeGini = gini !== '' ? gini : 0.35;
                    let giniRisk = (Math.min(Math.max(safeGini, 0.25), 0.45) - 0.25) / 0.2 * 10;
                    let safeUrate = uRate !== '' ? uRate : 3.5;
                    let unempRisk = (Math.min(Math.max(safeUrate, 2), 10) - 2) / 8 * 10;
                    
                    riskScore = ((incRisk * 0.30) + (povRisk * 0.30) + (unempRisk * 0.25) + (giniRisk * 0.15)).toFixed(1);
                }

                return {
                    State: row.state || '',
                    District: row.district || '',
                    Category: row.category || '',
                    Type: row.type || '',
                    Year: yr,
                    Crimes: crimes,
                    Population: pop,
                    Area_SqKm: areaKm2 ? areaKm2.toFixed(1) : '',
                    Density_Per_SqKm: popDensity,
                    Crime_Rate_Per_100k: crimeRate,
                    Median_Income_RM: inc,
                    Relative_Poverty_Pct: pov,
                    Unemployment_Pct: uRate,
                    Gini_Coefficient: gini,
                    Socioeconomic_Risk_Score: riskScore
                };
            });

            const csvString = Papa.unparse(exportData);
            const blob = new Blob([csvString], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", "malaysia_crime_socioeconomic_data.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });

        function normalizeName(name) {
            if (!name) return "";
            return name.toLowerCase()
                .replace(/w\.p\.\s*/g, '')
                .replace(/federal territory of /g, '')
                .replace(/darul\s+[a-z']+/g, '')
                .replace(/pulau pinang/g, 'penang')
                .replace(/[^a-z0-9]/g, '');
        }

        function getFeatureName(feature) {
            const props = feature.properties;
            for (const key of ['name', 'Name', 'NAME', 'NAME_1', 'NAME_2', 'shapeName', 'nam_daerah']) {
                if (props[key]) return props[key];
            }
            return "Unknown";
        }

        // --- Data Aggregation Logic ---
        function getAggregatedData() {
            let counts = {};

            rawData.forEach(row => {
                if (!row.state || row.state === 'Malaysia') return;
                if (row.district === 'All' || row.district === 'all') return; 

                if (filters.year !== 'All' && row.year !== filters.year) return;
                if (filters.category !== 'All' && row.category !== filters.category) return;

                if (row.type === 'all' || row.type === 'All') return;
                if (filters.type !== 'All' && row.type !== filters.type) return;

                let nameKey = filters.level === 'state' ? normalizeName(row.state) : normalizeName(row.district);

                if (!counts[nameKey]) counts[nameKey] = { total: 0, types: {} };
                
                let val = Number(row.crimes) || 0;
                counts[nameKey].total += val;
                
                if (!counts[nameKey].types[row.type]) counts[nameKey].types[row.type] = 0;
                counts[nameKey].types[row.type] += val;
            });

            return counts;
        }

        // --- Chart Rendering Logic ---
        function renderChart() {
            if (!rawData || rawData.length === 0) return;

            const yearCounts = {};
            const activeYears = availableYears.filter(y => y !== 'All').sort();
            activeYears.forEach(y => yearCounts[y] = 0);

            rawData.forEach(row => {
                if (!row.state || row.state === 'Malaysia') return;
                if (row.district === 'All' || row.district === 'all') return; 
                if (filters.category !== 'All' && row.category !== filters.category) return;
                if (row.type === 'all' || row.type === 'All') return;
                if (filters.type !== 'All' && row.type !== filters.type) return;

                const yr = row.year || (row.date ? String(row.date).substring(0, 4) : null);
                if (yr && yearCounts[yr] !== undefined) {
                    yearCounts[yr] += (Number(row.crimes) || 0);
                }
            });

            const dataPoints = activeYears.map(y => yearCounts[y]);

            const lineColor = 'rgba(220, 38, 38, 0.8)';
            const fillColor = 'rgba(220, 38, 38, 0.1)'; 
            const defaultPointColor = 'rgba(239, 68, 68, 1)'; 
            const highlightPointColor = 'rgba(153, 27, 27, 1)'; 

            const pointBgColors = activeYears.map(y => y === filters.year ? highlightPointColor : defaultPointColor);
            const pointRadii = activeYears.map(y => y === filters.year ? 6 : 3);

            if (trendChart) {
                trendChart.data.labels = activeYears;
                trendChart.data.datasets[0].data = dataPoints;
                trendChart.data.datasets[0].pointBackgroundColor = pointBgColors;
                trendChart.data.datasets[0].pointBorderColor = pointBgColors;
                trendChart.data.datasets[0].pointRadius = pointRadii;
                trendChart.update();
            } else {
                const ctx = document.getElementById('trendChart').getContext('2d');
                trendChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: activeYears,
                        datasets: [{
                            label: 'Reported Crimes',
                            data: dataPoints,
                            borderColor: lineColor,
                            backgroundColor: fillColor,
                            borderWidth: 2,
                            pointBackgroundColor: pointBgColors,
                            pointBorderColor: pointBgColors,
                            pointRadius: pointRadii,
                            pointHoverRadius: 6,
                            fill: true,
                            tension: 0.3 
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        return context.raw.toLocaleString() + ' cases';
                                    }
                                }
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: { font: { size: 10 }, maxTicksLimit: 5 },
                                grid: { color: '#e2e8f0' }
                            },
                            x: {
                                ticks: { font: { size: 10 } },
                                grid: { display: false }
                            }
                        }
                    }
                });
            }
        }

        // --- Rendering Map Elements ---
        function getColor(d, max) {
            if (d === 0) return '#f8fafc'; 
            return d > max * 0.8 ? '#7f1d1d' : 
                   d > max * 0.6 ? '#b91c1c' : 
                   d > max * 0.4 ? '#ef4444' : 
                   d > max * 0.2 ? '#f87171' : 
                   d > 0         ? '#fca5a5' : 
                                   '#fee2e2';  
        }

        function updateMap() {
            if (geojsonLayer) map.removeLayer(geojsonLayer);
            
            const geojsonData = filters.level === 'state' ? stateGeojson : districtGeojson;
            if (!geojsonData) return;

            const counts = getAggregatedData();
            const crimeValues = Object.values(counts).map(c => c.total);
            const maxCrimes = crimeValues.length > 0 ? Math.max(...crimeValues) : 0;

            geojsonLayer = L.geoJSON(geojsonData, {
                style: function(feature) {
                    const name = getFeatureName(feature);
                    const locData = counts[normalizeName(name)] || { total: 0 };
                    const crimeCount = locData.total;
                    return {
                        fillColor: getColor(crimeCount, maxCrimes),
                        weight: filters.level === 'state' ? 1.5 : 1,
                        opacity: 1,
                        color: '#cbd5e1', 
                        fillOpacity: crimeCount > 0 ? 0.85 : 0.4
                    };
                },
                onEachFeature: function(feature, layer) {
                    const name = getFeatureName(feature);
                    const normName = normalizeName(name);
                    const locData = counts[normName] || { total: 0, types: {} };
                    const crimeCount = locData.total;
                    
                    // --- Population & Density Logic ---
                    let popHtml = '';
                    const levelData = popLookup[filters.level];
                    
                    if (levelData && levelData[normName]) {
                        let yearTarget = filters.year === 'All' ? '2023' : filters.year; 
                        let popCount = levelData[normName][yearTarget];
                        
                        if (!popCount) {
                            const availableYrs = Object.keys(levelData[normName]).sort().reverse();
                            if(availableYrs.length > 0) {
                                yearTarget = availableYrs[0];
                                popCount = levelData[normName][yearTarget];
                            }
                        }
                        
                        if (popCount) {
                            let rate = crimeCount > 0 ? ((crimeCount / popCount) * 100000).toFixed(1) : 0;
                            
                            // Turf JS Cached Area
                            let areaSqKm = geoAreaCache[filters.level][normName] || 0;
                            let densityStr = "N/A";
                            if (areaSqKm > 0) {
                                densityStr = (popCount / areaSqKm).toLocaleString(undefined, {maximumFractionDigits: 0}) + ' /km²';
                            }

                            popHtml = `
                                <div class="text-[11px] text-gray-600 flex justify-between items-center mt-1.5 border-t border-gray-100 pt-1.5">
                                    <span>Pop. (${yearTarget}):</span>
                                    <span class="font-bold text-blue-700 ml-3">${Math.round(popCount).toLocaleString()}</span>
                                </div>
                                <div class="text-[11px] text-gray-600 flex justify-between items-center mt-0.5">
                                    <span>Density:</span>
                                    <span class="font-bold text-gray-700 ml-3">${densityStr}</span>
                                </div>
                                <div class="text-[11px] text-gray-600 flex justify-between items-center mt-0.5">
                                    <span>Crime Rate / 100k:</span>
                                    <span class="font-bold ${rate > 0 ? 'text-red-600' : 'text-gray-400'} ml-3">
                                        ${rate}
                                    </span>
                                </div>
                            `;
                        }
                    }
                    
                    // --- Income Logic ---
                    let incomeHtml = '';
                    const incomeLevelData = incomeLookup[filters.level];
                    let incVal = undefined; 
                    if (incomeLevelData && incomeLevelData[normName]) {
                        let yearTarget = filters.year === 'All' ? '2022' : filters.year; 
                        incVal = incomeLevelData[normName][yearTarget];
                        
                        if (!incVal) {
                            const availableYrs = Object.keys(incomeLevelData[normName]).sort().reverse();
                            if(availableYrs.length > 0) {
                                let targetYrNum = filters.year === 'All' ? 9999 : parseInt(filters.year);
                                let closestYr = availableYrs.find(y => parseInt(y) <= targetYrNum) || availableYrs[0];
                                yearTarget = closestYr;
                                incVal = incomeLevelData[normName][yearTarget];
                            }
                        }
                        if (incVal) {
                            incomeHtml = `
                                <div class="text-[11px] text-gray-600 flex justify-between items-center mt-1.5 border-t border-gray-100 pt-1.5">
                                    <span>Med. Income (${yearTarget}):</span>
                                    <span class="font-bold text-green-700 ml-3">RM ${incVal.toLocaleString()}</span>
                                </div>
                            `;
                        }
                    }
                    
                    // --- Poverty Logic ---
                    let povertyHtml = '';
                    const povertyLevelData = povertyLookup[filters.level];
                    let povVal = undefined;
                    if (povertyLevelData && povertyLevelData[normName]) {
                        let yearTarget = filters.year === 'All' ? '2022' : filters.year; 
                        povVal = povertyLevelData[normName][yearTarget];
                        
                        if (povVal === undefined) {
                            const availableYrs = Object.keys(povertyLevelData[normName]).sort().reverse();
                            if(availableYrs.length > 0) {
                                let targetYrNum = filters.year === 'All' ? 9999 : parseInt(filters.year);
                                let closestYr = availableYrs.find(y => parseInt(y) <= targetYrNum) || availableYrs[0];
                                yearTarget = closestYr;
                                povVal = povertyLevelData[normName][yearTarget];
                            }
                        }
                        if (povVal !== undefined) {
                            povertyHtml = `
                                <div class="text-[11px] text-gray-600 flex justify-between items-center mt-0.5">
                                    <span>Rel. Poverty (${yearTarget}):</span>
                                    <span class="font-bold text-orange-600 ml-3">${povVal.toFixed(1)}%</span>
                                </div>
                            `;
                        }
                    }

                    // --- Unemployment Logic ---
                    let unempHtml = '';
                    const unempLevelData = unemploymentLookup[filters.level];
                    let uRateVal = undefined;
                    if (unempLevelData && unempLevelData[normName]) {
                        let yearTarget = filters.year === 'All' ? '2023' : filters.year; 
                        uRateVal = unempLevelData[normName][yearTarget];
                        
                        if (uRateVal === undefined) {
                            const availableYrs = Object.keys(unempLevelData[normName]).sort().reverse();
                            if(availableYrs.length > 0) {
                                let targetYrNum = filters.year === 'All' ? 9999 : parseInt(filters.year);
                                let closestYr = availableYrs.find(y => parseInt(y) <= targetYrNum) || availableYrs[0];
                                yearTarget = closestYr;
                                uRateVal = unempLevelData[normName][yearTarget];
                            }
                        }
                        if (uRateVal !== undefined) {
                            unempHtml = `
                                <div class="text-[11px] text-gray-600 flex justify-between items-center mt-0.5">
                                    <span>Unemployment (${yearTarget}):</span>
                                    <span class="font-bold text-pink-600 ml-3">${uRateVal.toFixed(1)}%</span>
                                </div>
                            `;
                        }
                    }

                    // --- Inequality Logic ---
                    let inequalityHtml = '';
                    const inequalityLevelData = inequalityLookup[filters.level];
                    let giniVal = undefined; 
                    if (inequalityLevelData && inequalityLevelData[normName]) {
                        let yearTarget = filters.year === 'All' ? '2022' : filters.year; 
                        giniVal = inequalityLevelData[normName][yearTarget];
                        
                        if (giniVal === undefined) {
                            const availableYrs = Object.keys(inequalityLevelData[normName]).sort().reverse();
                            if(availableYrs.length > 0) {
                                let targetYrNum = filters.year === 'All' ? 9999 : parseInt(filters.year);
                                let closestYr = availableYrs.find(y => parseInt(y) <= targetYrNum) || availableYrs[0];
                                yearTarget = closestYr;
                                giniVal = inequalityLevelData[normName][yearTarget];
                            }
                        }
                        if (giniVal !== undefined) {
                            inequalityHtml = `
                                <div class="text-[11px] text-gray-600 flex justify-between items-center mt-0.5">
                                    <span>Income Inequality (Gini) (${yearTarget}):</span>
                                    <span class="font-bold text-purple-600 ml-3">${giniVal.toFixed(3)}</span>
                                </div>
                            `;
                        }
                    }

                    // --- Socioeconomic Risk Score Logic ---
                    let riskHtml = '';
                    if (incVal !== undefined && povVal !== undefined) {
                        // Weighted Average: Income(30%), Poverty(30%), Unemployment(25%), Gini(15%)
                        let incRisk = (1 - (Math.min(Math.max(incVal, 2500), 12500) - 2500) / 10000) * 10;
                        let povRisk = (Math.min(Math.max(povVal, 0), 25) / 25) * 10;
                        
                        let safeGini = giniVal !== undefined ? giniVal : 0.35;
                        let giniRisk = (Math.min(Math.max(safeGini, 0.25), 0.45) - 0.25) / 0.2 * 10;

                        let safeUrate = uRateVal !== undefined ? uRateVal : 3.5;
                        let unempRisk = (Math.min(Math.max(safeUrate, 2), 10) - 2) / 8 * 10;
                        
                        let totalRisk = (incRisk * 0.30) + (povRisk * 0.30) + (unempRisk * 0.25) + (giniRisk * 0.15);
                        
                        let riskColor = totalRisk >= 7 ? 'text-red-600' : (totalRisk >= 4 ? 'text-orange-500' : 'text-green-600');
                        
                        riskHtml = `
                            <div class="text-[11px] text-gray-600 flex justify-between items-center mt-1.5 pt-1.5 border-t border-gray-200 bg-gray-50 -mx-1 px-1 rounded shadow-inner">
                                <span class="font-bold uppercase tracking-wide text-[9px] text-gray-500">Socioeconomic Risk:</span>
                                <span class="font-extrabold ${riskColor} ml-3 text-xs">${totalRisk.toFixed(1)} / 10</span>
                            </div>
                        `;
                    }

                    // --- Types Breakdown ---
                    let typesHtml = '';
                    if (crimeCount > 0 && locData.types) {
                        const sortedTypes = Object.entries(locData.types).sort((a, b) => b[1] - a[1]);
                        typesHtml = '<div class="mt-2 border-t border-gray-200 pt-1.5 space-y-0.5">';
                        sortedTypes.forEach(([type, count]) => {
                            const typeName = type.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
                            typesHtml += `
                                <div class="flex justify-between items-center text-[11px]">
                                    <span class="text-gray-500 truncate mr-3 flex-1">${typeName}</span>
                                    <span class="font-medium text-gray-700">${count.toLocaleString()}</span>
                                </div>
                            `;
                        });
                        typesHtml += '</div>';
                    }
                    
                    const tooltipContent = `
                        <div class="px-1 min-w-[180px] max-w-[240px]">
                            <div class="font-bold text-gray-800 text-[14px] border-b border-gray-200 pb-1 mb-1.5 uppercase tracking-wide">
                                ${name}
                            </div>
                            <div class="text-xs text-gray-600 flex justify-between items-center">
                                <span>Total Crimes:</span>
                                <span class="font-bold ${crimeCount > 0 ? 'text-red-600' : 'text-gray-400'} ml-3">
                                    ${crimeCount.toLocaleString()}
                                </span>
                            </div>
                            ${popHtml}
                            ${incomeHtml}
                            ${povertyHtml}
                            ${unempHtml}
                            ${inequalityHtml}
                            ${riskHtml}
                            ${typesHtml}
                        </div>
                    `;
                    
                    layer.bindTooltip(tooltipContent, {
                        direction: 'top',
                        sticky: true,
                        className: 'bg-white/95 backdrop-blur shadow-2xl rounded-lg border border-gray-100 p-2'
                    });
                    
                    layer.on({
                        mouseover: function(e) {
                            const l = e.target;
                            l.setStyle({
                                weight: 3,
                                color: '#1e293b', 
                                fillOpacity: 1
                            });
                            l.bringToFront();
                        },
                        mouseout: function(e) {
                            geojsonLayer.resetStyle(e.target);
                        }
                    });
                }
            }).addTo(map);

            updateLegend(maxCrimes);
            renderChart();
        }

        function updateLegend(maxCrimes) {
            const container = document.getElementById('legendContainer');
            
            if (maxCrimes === 0) {
                container.classList.add('hidden');
                return;
            }
            container.classList.remove('hidden');

            const grades = [
                0, 
                Math.floor(maxCrimes * 0.2), 
                Math.floor(maxCrimes * 0.4), 
                Math.floor(maxCrimes * 0.6), 
                Math.floor(maxCrimes * 0.8)
            ];
            
            let html = '<h4 class="font-bold text-xs uppercase tracking-wider text-gray-500 mb-3 border-b pb-1">Crime Heatmap</h4><div class="space-y-1.5 text-xs text-gray-700">';
            
            for (let i = 0; i < grades.length; i++) {
                const start = grades[i];
                const end = grades[i + 1];
                const colorValue = getColor(start + 1, maxCrimes);
                
                html += `
                    <div class="flex items-center">
                        <span class="legend-color-box shadow-sm" style="background:${colorValue}"></span>
                        <span>${start.toLocaleString()} ${end ? '&ndash; ' + end.toLocaleString() : '+'}</span>
                    </div>`;
            }
            
            html += `
                <div class="flex items-center mt-2 pt-2 border-t border-gray-100">
                    <span class="legend-color-box shadow-sm" style="background:#f8fafc"></span>
                    <span class="text-gray-400">No Data / 0</span>
                </div>
            </div>`;
            
            container.innerHTML = html;
        }

        // Start App
        init();
    </script>
</body>
</html>
