<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kedah Crime Data Visualization</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Leaflet Map CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        #map { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 0; background: #e5e7eb; }
        
        /* Custom scrollbar for control panel */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .legend-color-box {
            display: inline-block;
            width: 16px;
            height: 16px;
            margin-right: 8px;
            border-radius: 3px;
            vertical-align: middle;
            border: 1px solid rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="font-sans text-gray-800">

    <!-- Map Container -->
    <div id="map"></div>
    
    <!-- UI Overlay: Control Panel (Left) -->
    <div class="absolute top-4 left-4 sm:top-6 sm:left-6 z-[1000] w-[90%] sm:w-80 max-h-[90vh] overflow-y-auto bg-white/95 backdrop-blur-md p-5 rounded-2xl shadow-2xl border border-gray-100">
        <div class="flex items-center justify-between mb-5 gap-3">
            <div class="flex items-center gap-3">
                <div class="bg-red-500 p-2 rounded-lg text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
                </div>
                <h2 class="text-xl font-extrabold text-gray-900 tracking-tight">Crime Map <span class="font-light text-gray-500">Kedah</span></h2>
            </div>
            
            <!-- Save Button -->

            </button>
        </div>
        

                        <!-- 2. Amenities -->
        <div class="mb-5">

            <!-- Station Type Checkboxes -->

                <label class="block text-xs font-medium text-gray-700 mb-1">Police Stations</label>
                <div class="grid grid-cols-2 gap-1.5">
                    <label class="flex items-center gap-2 text-xs text-gray-700 cursor-pointer">
                        <input type="checkbox" class="amenity-check accent-blue-800 w-3.5 h-3.5 rounded" data-type="headquarters" checked>
                        <span class="inline-block w-2.5 h-2.5 rounded-full" style="background:#1e3a8a"></span> HQ
                    </label>
                    <label class="flex items-center gap-2 text-xs text-gray-700 cursor-pointer">
                        <input type="checkbox" class="amenity-check accent-red-600 w-3.5 h-3.5 rounded" data-type="balai" checked>
                        <span class="inline-block w-2.5 h-2.5 rounded-full" style="background:#dc2626"></span> Balai Polis
                    </label>
                    <label class="flex items-center gap-2 text-xs text-gray-700 cursor-pointer">
                        <input type="checkbox" class="amenity-check accent-amber-500 w-3.5 h-3.5 rounded" data-type="pondok">
                        <span class="inline-block w-2.5 h-2.5 rounded-full" style="background:#f59e0b"></span> Pondok Polis
                    </label>
                    <label class="flex items-center gap-2 text-xs text-gray-700 cursor-pointer">
                        <input type="checkbox" class="amenity-check accent-blue-600 w-3.5 h-3.5 rounded" data-type="traffic" checked>
                        <span class="inline-block w-2.5 h-2.5 rounded-full" style="background:#2563eb"></span> Trafik
                    </label>
                    <label class="flex items-center gap-2 text-xs text-gray-700 cursor-pointer">
                        <input type="checkbox" class="amenity-check accent-purple-600 w-3.5 h-3.5 rounded" data-type="specialist" checked>
                        <span class="inline-block w-2.5 h-2.5 rounded-full" style="background:#7c3aed"></span> Specialist
                    </label>
                    <label class="flex items-center gap-2 text-xs text-gray-700 cursor-pointer">
                        <input type="checkbox" class="amenity-check accent-emerald-600 w-3.5 h-3.5 rounded" data-type="komuniti" checked>
                        <span class="inline-block w-2.5 h-2.5 rounded-full" style="background:#059669"></span> Komuniti
                    </label>
                </div>
                <span id="stationCount" class="text-[10px] text-gray-400">0 stations shown</span>
            </div>

            <!-- Coverage Radius Slider -->
            <div class="mt-3">
                <div class="flex justify-between items-center mb-1">
                    <label class="block text-xs font-medium text-gray-700">Coverage Radius</label>
                    <span id="coverageDisplay" class="text-xs font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded shadow-sm border border-blue-100">0 km</span>
                </div>
                <input type="range" id="coverageSlider" min="0" max="20" value="0" step="1"
                       class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-500">
                <div class="flex justify-between text-[10px] text-gray-400 mt-1 px-1 font-medium">
                    <span>0 km</span>
                    <span>20 km</span>
                </div>
            
            <!-- MPV Patrol Routes -->

                </div>
                <div class="flex items-center gap-2 text-xs text-gray-700 mb-1">
                    <label>MPVs:</label>
                    <select id="mpvCount" class="rounded border-gray-200 bg-gray-50 text-xs p-1 outline-none">

                        <option value="3" selected>3</option>
                        <option value="5">5</option>
                        <option value="8">8</option>
                    </select>

            </div>
</div>
        </div>

<!-- Filters (collapsible, default collapsed) -->

            </div>

        // Cache square kilometers area for Density calculations
        function calculateGeoAreas(geoJsonData, level) {

                    geoAreaCache[level][name] = areaSqMeters / 1000000; // Convert to Sq KM
                }
            });

        async function fetchPopulationData() {
            try {
                const res = await fetch('https://api.data.gov.my/data-catalogue/?id=population_district&limit=100000');
                if (!res.ok) return;
                const json = await res.json();
                const data = (json.data || json).filter(isKedahRow);
                
                let isThousands = false;
                const maxPop = Math.max(...data.map(d => Number(d.population) || 0));
                if (maxPop < 100000) isThousands = true;

                data.forEach(row => {
                    let yr = row.date ? String(row.date).substring(0, 4) : null;
                    if (!yr || yr < '2016') return; 
                    
                    let st = normalizeName(row.state);
                    let dist = normalizeName(row.district);
                    let pop = Number(row.population) || 0;
                    if (isThousands) pop *= 1000;
                    
                    if (st) {
                        if (!popLookup.state[st]) popLookup.state[st] = {};
                        if (!popLookup.state[st][yr]) popLookup.state[st][yr] = 0;
                        popLookup.state[st][yr] += pop;
                    }
                    if (dist && dist !== 'all') {
                        if (!popLookup.district[dist]) popLookup.district[dist] = {};
                        if (!popLookup.district[dist][yr]) popLookup.district[dist][yr] = 0;
                        popLookup.district[dist][yr] += pop;
                    }
                });
            } catch (err) {
                console.error("Could not fetch population data", err);
            }
        }

        // --- Data Fetching Helpers ---
        function getMetric(lookup, level, normName, targetYear) {
            const levelData = lookup[level];
            if (!levelData || !levelData[normName]) return { value: undefined, year: targetYear };
            
            let val = levelData[normName][targetYear];
            if (val !== undefined) return { value: val, year: targetYear };

            const availableYrs = Object.keys(levelData[normName]).sort().reverse();
            if (availableYrs.length > 0) {
                let targetYrNum = targetYear === 'All' ? 9999 : parseInt(targetYear);
                let closestYr = availableYrs.find(y => parseInt(y) <= targetYrNum) || availableYrs[0];
                return { value: levelData[normName][closestYr], year: closestYr };
            }
            return { value: undefined, year: targetYear };
        }

        function getRiskScoreDetailed(normName) {
            let incVal = getMetric(incomeLookup, filters.level, normName, filters.year === 'All' ? '2022' : filters.year).value;
            let povVal = getMetric(povertyLookup, filters.level, normName, filters.year === 'All' ? '2022' : filters.year).value;
            let uRateVal = getMetric(unemploymentLookup, filters.level, normName, filters.year === 'All' ? '2023' : filters.year).value;
            let giniVal = getMetric(inequalityLookup, filters.level, normName, filters.year === 'All' ? '2022' : filters.year).value;

            if (incVal !== undefined && povVal !== undefined) {
                // Individual risk components (0-10)
                let incRisk = (1 - (Math.min(Math.max(incVal, 2500), 12500) - 2500) / 10000) * 10;
                let povRisk = (Math.min(Math.max(povVal, 0), 25) / 25) * 10;
                let safeGini = giniVal !== undefined ? giniVal : 0.35;
                let giniRisk = (Math.min(Math.max(safeGini, 0.25), 0.45) - 0.25) / 0.2 * 10;
                let safeUrate = uRateVal !== undefined ? uRateVal : 3.5;
                let unempRisk = (Math.min(Math.max(safeUrate, 2), 10) - 2) / 8 * 10;
                
                // Final Weighted Score
                let score = (incRisk * 0.30) + (povRisk * 0.30) + (unempRisk * 0.25) + (giniRisk * 0.15);
                
                return {
                    score: score,
                    components: {
                        income: incRisk,
                        poverty: povRisk,
                        unemployment: unempRisk,
                        inequality: giniRisk
                    }
                };
            }
            return null;
        }

        async function generatePatrolRoutes() {
            if (patrolLayerGroup) map.removeLayer(patrolLayerGroup);
            patrolLayerGroup = L.layerGroup();

            if (!rawData || rawData.length === 0) {
                showToast('Load crime data first before generating patrol routes');
                return;
            }

            const mpvCount = parseInt(document.getElementById('mpvCount').value);
            const counts = getAggregatedData();

            // Get top crime districts
            const sorted = Object.entries(counts)
                .filter(([n, d]) => d.total > 0 && districtCentroids[n])
                .sort((a, b) => b[1].total - a[1].total);

            if (sorted.length === 0) {
                showToast('No crime data to generate routes');
                return;
            }

            // Distribute hotspots across MPVs (round-robin by severity)
            const mpvAssignments = [];
            for (let i = 0; i < mpvCount; i++) mpvAssignments.push([]);
            sorted.forEach((entry, idx) => {
                mpvAssignments[idx % mpvCount].push(entry);
            });

            const routeColors = ['#ef4444', '#3b82f6', '#22c55e', '#f59e0b', '#8b5cf6', '#ec4899', '#14b8a6', '#f97316'];
            let summaryHtml = '';
            let successCount = 0;

            for (let m = 0; m < mpvAssignments.length; m++) {
                const hotspots = mpvAssignments[m].map(([name, data]) => ({
                    name, crimes: data.total,
                    lat: districtCentroids[name].lat,
                    lon: districtCentroids[name].lon
                }));

                if (hotspots.length === 0) continue;

                // Find nearest visible balai polis to first hotspot
                const firstH = hotspots[0];
                let nearestStation = null, nearestDist = Infinity;
                if (policeData) {
                    policeData.features.forEach(f => {
                        if (!visibleTypes.has(f.properties.type)) return;
                        const [sLon, sLat] = f.geometry.coordinates;
                        const dist = Math.sqrt(Math.pow(firstH.lat - sLat, 2) + Math.pow(firstH.lon - sLon, 2));
                        if (dist < nearestDist) { nearestDist = dist; nearestStation = f; }
                    });
                }

                if (!nearestStation) continue;

                const [sLon, sLat] = nearestStation.geometry.coordinates;
                const color = routeColors[m % routeColors.length];

                // Build waypoints: station -> hotspots -> back to station
                const waypoints = [sLon + ',' + sLat];
                hotspots.forEach(h => waypoints.push(h.lon + ',' + h.lat));
                waypoints.push(sLon + ',' + sLat);

                try {
                    const url = 'https://router.project-osrm.org/route/v1/driving/' + waypoints.join(';') + '?overview=full&geometries=geojson';
                    const res = await fetch(url);
                    const data = await res.json();

                    if (data.code === 'Ok' && data.routes && data.routes.length > 0) {
                        const route = data.routes[0];
                        const coords = route.geometry.coordinates.map(c => [c[1], c[0]]);

                        // Route polyline
                        L.polyline(coords, {
                            color: color,
                            weight: 5,
                            opacity: 0.7,
                            dashArray: '10 6',
                            lineCap: 'round'
                        }).addTo(patrolLayerGroup);

                        // MPV marker at station
                        L.marker([sLat, sLon], {
                            icon: L.divIcon({
                                className: 'mpv-marker',
                                html: '<div style="background:' + color + ';color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,0.3);border:2px solid #fff;">' + (m+1) + '</div>',
                                iconSize: [30, 30],
                                iconAnchor: [15, 15]
                            })
                        }).bindPopup(
                            '<b>MPV ' + (m+1) + '</b><br>' +
                            'From: ' + nearestStation.properties.name + '<br>' +
                            'Distance: ' + (route.distance/1000).toFixed(1) + ' km<br>' +
                            'Est: ' + Math.round(route.duration/60) + ' min<br>' +
                            'Patrols: ' + hotspots.map(h => h.name).join(', ')
                        ).addTo(patrolLayerGroup);

                        // Hotspot dots along route
                        hotspots.forEach(h => {
                            L.circleMarker([h.lat, h.lon], {
                                radius: 6, color: color, fillColor: color,
                                fillOpacity: 0.4, weight: 2
                            }).addTo(patrolLayerGroup);
                        });

                        summaryHtml += '<div class="flex items-center gap-1"><span class="inline-block w-2 h-2 rounded-full" style="background:' + color + '"></span> MPV' + (m+1) + ': ' + nearestStation.properties.name + ' → ' + hotspots.map(h => h.name).join(' → ') + ' <span class="text-gray-400">(' + (route.distance/1000).toFixed(0) + 'km, ~' + Math.round(route.duration/60) + 'min)</span></div>';
                        successCount++;
                    }
                } catch(e) {
                    console.error('Route error MPV' + (m+1), e);
                }
            }

            patrolLayerGroup.addTo(map);
            // Bring patrol routes above heatmap
            if (patrolLayerGroup) {
                patrolLayerGroup.eachLayer(l => l.bringToFront());
            }

            if (successCount === 0) {
                showToast('Could not generate routes. Check network.');
            } else {
                const summaryEl = document.getElementById('patrolSummary');
                summaryEl.innerHTML = summaryHtml;
                summaryEl.classList.remove('hidden');
                showToast(successCount + ' patrol route(s) generated');
            }
        }

                        const yr = dateStr.substring(0, 4);

        function formatCrimeType(type) {

        function displayRandomFact() {
            if (!rawData || rawData.length === 0) return;
            
            const validData = rawData.filter(r => 
                r.district && r.district.toLowerCase() !== 'all' && 
                r.type && r.type.toLowerCase() !== 'all' && 
                Number(r.crimes) > 0
            );
            
            if (validData.length === 0) return;

            const row = validData[Math.floor(Math.random() * validData.length)];
            const year = row.year || String(row.date).substring(0, 4);
            const district = row.district;
            const state = row.state;
            const crimes = Number(row.crimes);
            const type = formatCrimeType(row.type);

            const templates = [
                `In ${year}, there were <strong class="font-extrabold text-yellow-950">${crimes}</strong> reported cases of ${type} in <strong>${district}</strong>, ${state}.`,
                `<strong class="font-extrabold text-yellow-950">${district}</strong> recorded <strong>${crimes}</strong> incidents of ${type} in ${year}.`,
                `On average, <strong>${(crimes/12).toFixed(1)}</strong> ${type} cases happened every month in <strong>${district}</strong> during ${year}.`
            ];

            if (crimes >= 365) {
                templates.push(`Every day, an average of <strong class="font-extrabold text-yellow-950">${Math.floor(crimes/365)}</strong> ${type} cases happened in <strong>${district}</strong> in ${year}.`);
            } else if (crimes >= 52) {
                templates.push(`Every week, an average of <strong class="font-extrabold text-yellow-950">${Math.floor(crimes/52)}</strong> ${type} cases happened in <strong>${district}</strong> in ${year}.`);
            }

            const text = templates[Math.floor(Math.random() * templates.length)];
            document.getElementById('factText').innerHTML = text;
            
            const banner = document.getElementById('factBanner');
            banner.classList.remove('hidden');
            banner.classList.add('block');
        }

document.getElementById('factBanner').addEventListener('click', displayRandomFact);

        // --- Consolidated Dataset Download Logic ---
        document.getElementById('downloadCsvBtn').addEventListener('click', () => {
            if (!rawData || rawData.length === 0) {
                showToast("No data available. Please load a dataset first.");
                return;
            }

            showToast("Generating consolidated dataset...");

            const getClosestData = (lookup, locationName, targetYear) => {
                if (!lookup || !lookup[locationName]) return '';
                if (lookup[locationName][targetYear] !== undefined) return lookup[locationName][targetYear];
                
                const availableYrs = Object.keys(lookup[locationName]).sort().reverse();
                if (availableYrs.length === 0) return '';
                let targetYrNum = parseInt(targetYear) || 9999;
                let closestYr = availableYrs.find(y => parseInt(y) <= targetYrNum) || availableYrs[0];
                return lookup[locationName][closestYr] !== undefined ? lookup[locationName][closestYr] : '';
            };

            const exportData = rawData.map(row => {
                const yr = row.year || (row.date ? String(row.date).substring(0, 4) : '');
                const normSt = normalizeName(row.state);
                const normDist = normalizeName(row.district);
                
                let pop = '', inc = '', pov = '', gini = '', uRate = '', areaKm2 = '', popDensity = '';

                if (normDist && normDist !== 'all') {
                    pop = getClosestData(popLookup.district, normDist, yr);
                    inc = getClosestData(incomeLookup.district, normDist, yr);
                    pov = getClosestData(povertyLookup.district, normDist, yr);
                    gini = getClosestData(inequalityLookup.district, normDist, yr);
                    uRate = getClosestData(unemploymentLookup.district, normDist, yr);
                    areaKm2 = geoAreaCache.district[normDist] || '';
                } else if (normSt) {
                    pop = getClosestData(popLookup.state, normSt, yr);
                    inc = getClosestData(incomeLookup.state, normSt, yr);
                    pov = getClosestData(povertyLookup.state, normSt, yr);
                    gini = getClosestData(inequalityLookup.state, normSt, yr);
                    uRate = getClosestData(unemploymentLookup.state, normSt, yr);
                    areaKm2 = geoAreaCache.state[normSt] || '';
                }

                if (pop && areaKm2) {
                    popDensity = (pop / areaKm2).toFixed(1);
                }

                // Calculate Crime Rate per 100k
                let crimeRate = '';
                let crimes = Number(row.crimes) || 0;
                if (pop > 0) {
                    crimeRate = ((crimes / pop) * 100000).toFixed(1);
                }

                // Calculate Socioeconomic Risk Score
                let riskScore = '';
                if (inc !== '' && pov !== '') {
                    let incRisk = (1 - (Math.min(Math.max(inc, 2500), 12500) - 2500) / 10000) * 10;
                    let povRisk = (Math.min(Math.max(pov, 0), 25) / 25) * 10;
                    let safeGini = gini !== '' ? gini : 0.35;
                    let giniRisk = (Math.min(Math.max(safeGini, 0.25), 0.45) - 0.25) / 0.2 * 10;
                    let safeUrate = uRate !== '' ? uRate : 3.5;
                    let unempRisk = (Math.min(Math.max(safeUrate, 2), 10) - 2) / 8 * 10;
                    
                    riskScore = ((incRisk * 0.30) + (povRisk * 0.30) + (unempRisk * 0.25) + (giniRisk * 0.15)).toFixed(1);
                }

                return {
                    State: row.state || '',
                    District: row.district || '',
                    Category: row.category || '',
                    Type: row.type || '',
                    Year: yr,
                    Crimes: crimes,
                    Population: pop,
                    Area_SqKm: areaKm2 ? areaKm2.toFixed(1) : '',
                    Density_Per_SqKm: popDensity,
                    Crime_Rate_Per_100k: crimeRate,
                    Median_Income_RM: inc,
                    Relative_Poverty_Pct: pov,
                    Unemployment_Pct: uRate,
                    Gini_Coefficient: gini,
                    Socioeconomic_Risk_Score: riskScore
                };
            });

            const csvString = Papa.unparse(exportData);
            const blob = new Blob([csvString], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", "malaysia_crime_socioeconomic_data.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });

        function normalizeName(name) {
            if (!name) return "";
            return name.toLowerCase()
                .replace(/w\.p\.\s*/g, '')
                .replace(/federal territory of /g, '')
                .replace(/darul\s+[a-z']+/g, '')
                .replace(/pulau pinang/g, 'penang')
                .replace(/[^a-z0-9]/g, '');
        }

        function getFeatureName(feature) {
            const props = feature.properties;
            for (const key of ['name', 'Name', 'NAME', 'NAME_1', 'NAME_2', 'shapeName', 'nam_daerah']) {
                if (props[key]) return props[key];
            }
            return "Unknown";
        }

        // --- Data Aggregation Logic ---
        function getAggregatedData() {
            let counts = {};

            rawData.forEach(row => {
                if (!row.state || row.state === 'Malaysia') return;
                if (row.district === 'All' || row.district === 'all') return; 

                if (filters.year !== 'All' && row.year !== filters.year) return;
                if (filters.category !== 'All' && row.category !== filters.category) return;

                if (row.type === 'all' || row.type === 'All') return;
                if (filters.type !== 'All' && row.type !== filters.type) return;

                let nameKey = filters.level === 'state' ? normalizeName(row.state) : normalizeName(row.district);

                if (!counts[nameKey]) counts[nameKey] = { total: 0, types: {} };
                
                let val = Number(row.crimes) || 0;
                counts[nameKey].total += val;
                
                if (!counts[nameKey].types[row.type]) counts[nameKey].types[row.type] = 0;
                counts[nameKey].types[row.type] += val;
            });

            return counts;
        }

        // --- Chart Rendering Logic ---
        function renderChart() {
            if (!rawData || rawData.length === 0) return;

            const yearCounts = {};
            const activeYears = availableYears.filter(y => y !== 'All').sort();
            activeYears.forEach(y => yearCounts[y] = 0);

            rawData.forEach(row => {
                if (!row.state || row.state === 'Malaysia') return;
                if (row.district === 'All' || row.district === 'all') return; 
                if (filters.category !== 'All' && row.category !== filters.category) return;
                if (row.type === 'all' || row.type === 'All') return;
                if (filters.type !== 'All' && row.type !== filters.type) return;

                const yr = row.year || (row.date ? String(row.date).substring(0, 4) : null);
                if (yr && yearCounts[yr] !== undefined) {
                    yearCounts[yr] += (Number(row.crimes) || 0);
                }
            });

            const dataPoints = activeYears.map(y => yearCounts[y]);

            const lineColor = 'rgba(220, 38, 38, 0.8)';
            const fillColor = 'rgba(220, 38, 38, 0.1)'; 
            const defaultPointColor = 'rgba(239, 68, 68, 1)';

                            tension: 0.3 
                        }]
                    },
                    options: {

                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        return context.raw.toLocaleString() + ' cases';
                                    }
                                }
                            }
                        },
                        scales: {

                                beginAtZero: true,
                                ticks: { font: { size: 10 }, maxTicksLimit: 5 },
                                grid: { color: '#e2e8f0' }
                            },
                            x: {
                                ticks: { font: { size: 10 } },
                                grid: { display: false }
                            }
                        }

        // --- Rendering Map Elements ---
        function getCrimeColor(d, max) {
            if (d === 0) return '#f8fafc'; 
            return d > max * 0.8 ? '#7f1d1d' : 
                   d > max * 0.6 ? '#b91c1c' : 
                   d > max * 0.4 ? '#ef4444' : 
                   d > max * 0.2 ? '#f87171' : 
                   d > 0         ? '#fca5a5' : 
                                   '#fee2e2';  
        }

        // Dedicated color palette for Socioeconomic Risk Map
        function getRiskColor(score) {
            if (score === null || score === undefined) return '#f8fafc'; 
            if (score >= 8) return '#991b1b'; // Dark Red (Very High Risk)
            if (score >= 6) return '#ef4444'; // Red (High Risk)
            if (score >= 4) return '#f97316'; // Orange (Medium Risk)
            if (score >= 2) return '#eab308'; // Yellow (Low-Medium)
            return '#22c55e';                 // Green (Low Risk)
        }

        function updateMap() {
            // Close Right Info Panel on global updates to prevent stale data
            document.getElementById('infoPanel').classList.add('hidden');
            selectedLayer = null;

            if (geojsonLayer) map.removeLayer(geojsonLayer);
            
            const geojsonData = filters.level === 'state' ? stateGeojson : districtGeojson;
            if (!geojsonData) return;

            const counts = getAggregatedData();
            const crimeValues = Object.values(counts).map(c => c.total);
            const maxCrimes = crimeValues.length > 0 ? Math.max(...crimeValues) : 0;

            geojsonLayer = L.geoJSON(geojsonData, {
                style: function(feature) {
                    const name = getFeatureName(feature);
                    const normName = normalizeName(name);
                    
                    let fillColor = districtColors[normName] || '#f8fafc';
                    let fillOp = 0.4;
                    
                    if (currentLayer === 'crime') {
                        const locData = counts[normName] || { total: 0 };
                        const crimeCount = locData.total;
                        if (crimeCount > 0) {
                            fillColor = getCrimeColor(crimeCount, maxCrimes);
                            fillOp = 0.85;
                        } else {
                            fillOp = 0.5;
                        }
                    } else if (currentLayer === 'risk') {
                        const riskDetails = getRiskScoreDetailed(normName);
                        const locData = counts[normName] || { total: 0 };
                        const crimeCount = locData.total;

                        if (riskDetails !== null && crimeCount > 0) {
                            const totalRisk = riskDetails.score;
                            
                            let yearTarget = filters.year === 'All' ? '2023' : filters.year; 
                            let popData = getMetric(popLookup, filters.level, normName, yearTarget);
                            
                            let rateNum = 0;
                            if (popData.value !== undefined && popData.value > 0) {
                                rateNum = (crimeCount / popData.value) * 100000;
                            }
                            
                            // Normalize crime rate onto 0-10 scale
                            let crimeScore = Math.min((rateNum / 500) * 10, 10);
                            
                            // Overall Area Risk (60% Socioeconomic, 40% Crime)
                            let combinedRisk = (totalRisk * 0.6) + (crimeScore * 0.4);
                            
                            fillColor = getRiskColor(combinedRisk);
                            fillOp = 0.85;
                        }
                        // If riskDetails is null OR crimeCount is 0, it defaults to district fillColor = '#f8fafc', fillOp = 0.4
                    }

                    return {
                        fillColor: fillColor,
                        weight: filters.level === 'state' ? 1.5 : 1,
                        opacity: 1,
                        color: '#cbd5e1', 
                        fillOpacity: fillOp
                    };
                },
                onEachFeature: function(feature, layer) {
                    const name = getFeatureName(feature);
                    const normName = normalizeName(name);
                    const locData = counts[normName] || { total: 0, types: {} };
                    const crimeCount = locData.total;
                    
                    // Retrieve unified metrics dynamically
                    let yearTarget = filters.year === 'All' ? '2023' : filters.year; 
                    let popData = getMetric(popLookup, filters.level, normName, yearTarget);
                    let incData = getMetric(incomeLookup, filters.level, normName, filters.year === 'All' ? '2022' : filters.year);
                    let povData = getMetric(povertyLookup, filters.level, normName, filters.year === 'All' ? '2022' : filters.year);
                    let unempData = getMetric(unemploymentLookup, filters.level, normName, yearTarget);
                    let giniData = getMetric(inequalityLookup, filters.level, normName, filters.year === 'All' ? '2022' : filters.year);

                    // --- HTML Segment Generators ---
                    let rate = 0;
                    let popHtml = '';
                    if (popData.value !== undefined) {
                        rate = crimeCount > 0 ? ((crimeCount / popData.value) * 100000).toFixed(1) : 0;
                        let areaSqKm = geoAreaCache[filters.level][normName] || 0;
                        let densityStr = "N/A";
                        if (areaSqKm > 0) {
                            densityStr = (popData.value / areaSqKm).toLocaleString(undefined, {maximumFractionDigits: 0}) + ' /km�';
                        }
                        popHtml = `
                            <div class="text-xs text-gray-600 flex justify-between items-center mt-1.5 border-t border-gray-100 pt-1.5">
                                <span>Pop. (${popData.year}):</span>
                                <span class="font-bold text-blue-700 ml-3">${Math.round(popData.value).toLocaleString()}</span>
                            </div>
                            <div class="text-xs text-gray-600 flex justify-between items-center mt-0.5">
                                <span>Density:</span>
                                <span class="font-bold text-gray-700 ml-3">${densityStr}</span>
                            </div>
                            <div class="text-xs text-gray-600 flex justify-between items-center mt-0.5">
                                <span>Crime Rate / 100k:</span>
                                <span class="font-bold ${rate > 0 ? 'text-red-600' : 'text-gray-400'} ml-3">${rate}</span>
                            </div>
                        `;
                    }
                    
                    let incomeHtml = '';
                    if (incData.value !== undefined) {
                        incomeHtml = `
                            <div class="text-xs text-gray-600 flex justify-between items-center mt-1.5 border-t border-gray-100 pt-1.5">
                                <span>Med. Income (${incData.year}):</span>
                                <span class="font-bold text-green-700 ml-3">RM ${incData.value.toLocaleString()}</span>
                            </div>
                        `;
                    }
                    
                    let povertyHtml = '';
                    if (povData.value !== undefined) {
                        povertyHtml = `
                            <div class="text-xs text-gray-600 flex justify-between items-center mt-0.5">
                                <span>Rel. Poverty (${povData.year}):</span>
                                <span class="font-bold text-orange-600 ml-3">${povData.value.toFixed(1)}%</span>
                            </div>
                        `;
                    }

                    let unempHtml = '';
                    if (unempData.value !== undefined) {
                        unempHtml = `
                            <div class="text-xs text-gray-600 flex justify-between items-center mt-0.5">
                                <span>Unemployment (${unempData.year}):</span>
                                <span class="font-bold text-pink-600 ml-3">${unempData.value.toFixed(1)}%</span>
                            </div>
                        `;
                    }

                    let inequalityHtml = '';
                    if (giniData.value !== undefined) {
                        inequalityHtml = `
                            <div class="text-xs text-gray-600 flex justify-between items-center mt-0.5">
                                <span>Income Inequality (Gini) (${giniData.year}):</span>
                                <span class="font-bold text-purple-600 ml-3">${giniData.value.toFixed(3)}</span>
                            </div>
                        `;
                    }

                    let riskHtml = '';
                    let interpretationHtml = '';
                    let combinedRiskHtml = '';
                    let riskDetails = getRiskScoreDetailed(normName);
                    
                    if (riskDetails !== null) {
                        const totalRisk = riskDetails.score;
                        let riskColor = totalRisk >= 7 ? 'text-red-600' : (totalRisk >= 4 ? 'text-orange-500' : 'text-green-600');
                        
                        riskHtml = `
                            <div class="text-xs text-gray-600 flex justify-between items-center mt-1.5 pt-1.5 border-t border-gray-200 bg-gray-50 -mx-1 px-1 rounded shadow-inner">
                                <span class="font-bold uppercase tracking-wide text-[10px] text-gray-500">Socioeconomic Risk:</span>
                                <span class="font-extrabold ${riskColor} ml-3 text-[13px]">${totalRisk.toFixed(1)} / 10</span>
                            </div>
                        `;

                        // --- ADVANCED RISK ANALYSIS (COMBINED) ---
                        if (crimeCount > 0) {
                            const components = riskDetails.components;
                            const drivers = [
                                { label: 'low median earnings', val: components.income * 0.30 },
                                { label: 'poverty levels', val: components.poverty * 0.30 },
                                { label: 'lack of employment', val: components.unemployment * 0.25 },
                                { label: 'wealth inequality', val: components.inequality * 0.15 }
                            ];
                            drivers.sort((a, b) => b.val - a.val);
                            const topDriver = drivers[0].label;
                            
                            let rateNum = parseFloat(rate) || 0;
                            
                            // Normalize Crime Rate to 0-10 scale (Assuming 500 cases per 100k is maximum severity = 10)
                            let crimeScore = Math.min((rateNum / 500) * 10, 10);
                            
                            // New Weightage: 60% Socioeconomic Risk, 40% Actual Crime Volume
                            let combinedRisk = (totalRisk * 0.6) + (crimeScore * 0.4);
                            let combinedColor = combinedRisk >= 7 ? 'text-red-600' : (combinedRisk >= 4 ? 'text-orange-500' : 'text-green-600');

                            // Generate Combined Index HTML for the tooltip/list
                            combinedRiskHtml = `
                                <div class="mt-2 pt-1.5 border-t border-gray-200">
                                    <div class="text-xs text-gray-600 flex justify-between items-center bg-gray-50 -mx-1 px-1 py-1.5 rounded shadow-inner">
                                        <span class="font-bold uppercase tracking-wide text-[10px] text-gray-500">Combined Index:</span>
                                        <span class="font-extrabold ${combinedColor} ml-3 text-[13px]">${combinedRisk.toFixed(1)} / 10</span>
                                    </div>
                                </div>
                            `;

                            // Theme for Combined Risk Analysis Banner
                            let riskTheme = { bg: 'bg-green-50', border: 'border-green-100', text: 'text-green-800', icon: 'text-green-600', label: 'Safe Zone' };
                            if (combinedRisk >= 7) {
                                riskTheme = { bg: 'bg-red-50', border: 'border-red-100', text: 'text-red-800', icon: 'text-red-600', label: 'High Alert' };
                            } else if (combinedRisk >= 4) {
                                riskTheme = { bg: 'bg-orange-50', border: 'border-orange-100', text: 'text-orange-800', icon: 'text-orange-600', label: 'Moderate' };
                            }
                            
                            let narrative = `<span class="opacity-80 text-[9px] block mb-2 mt-0.5">(60% Socioeconomic Strain + 40% Crime Volume)</span>`;
                            
                            if (totalRisk >= 6 && crimeScore >= 5) {
                                narrative += `This area faces compounding risks. High economic strain (driven heavily by <strong>${topDriver}</strong>) correlates directly with the high crime rates. Financial desperation is likely driving local crime.`;
                            } else if (totalRisk >= 6 && crimeScore < 5) {
                                narrative += `A highly resilient community! Despite elevated economic strain from <strong>${topDriver}</strong>, the crime rate remains remarkably low. Points to strong local community bonds or highly effective policing.`;
                            } else if (totalRisk < 6 && crimeScore >= 5) {
                                narrative += `A classic "Target Zone". The local economy is relatively stable, yet crime volume is disproportionately high. Wealthier or commercial hubs here are likely attracting property theft from outsiders.`;
                            } else {
                                narrative += `A generally stable region. Manageable economic conditions safely correlate with the controlled, lower crime rates observed here.`;
                            }

                            interpretationHtml = `
                                <div class="mt-6 pt-5 border-t border-gray-200">
                                    <div class="mb-2 p-3 ${riskTheme.bg} rounded-xl border ${riskTheme.border} shadow-sm">
                                        <div class="flex items-center justify-between mb-1.5">
                                            <div class="flex items-center gap-1.5">
                                                <!-- Shield Icon -->
                                                <svg class="${riskTheme.icon}" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                                                <span class="text-[11px] font-bold ${riskTheme.text} uppercase tracking-wider">Overall Area Risk</span>
                                            </div>
                                            <span class="text-[9px] font-extrabold px-1.5 py-0.5 rounded bg-white/60 ${riskTheme.text} shadow-sm">${riskTheme.label}</span>
                                        </div>
                                        <p class="text-[11px] ${riskTheme.text} leading-relaxed">
                                            ${narrative}
                                        </p>
                                    </div>
                                </div>
                            `;
                        } else {
                            // Missing or Zero Crime Data
                            combinedRiskHtml = `
                                <div class="mt-2 pt-1.5 border-t border-gray-200">
                                    <div class="text-xs text-gray-600 flex justify-between items-center bg-gray-50 -mx-1 px-1 py-1.5 rounded shadow-inner">
                                        <span class="font-bold uppercase tracking-wide text-[10px] text-gray-500">Combined Index:</span>
                                        <span class="font-bold text-gray-400 ml-3 text-[13px]">N/A</span>
                                    </div>
                                </div>
                            `;
                            interpretationHtml = ''; 
                        }
                    }

                    let typesHtml = '';
                    if (crimeCount > 0 && locData.types) {
                        const sortedTypes = Object.entries(locData.types).sort((a, b) => b[1] - a[1]);
                        typesHtml = '<div class="mt-2 border-t border-gray-200 pt-1.5 space-y-0.5">';
                        sortedTypes.forEach(([type, count]) => {
                            const typeName = type.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
                            typesHtml += `
                                <div class="flex justify-between items-center text-xs">
                                    <span class="text-gray-500 truncate mr-3 flex-1">${typeName}</span>
                                    <span class="font-medium text-gray-700">${count.toLocaleString()}</span>
                                </div>
                            `;
                        });
                        typesHtml += '</div>';
                    }
                    
                    // Unified inner HTML for both Tooltip and Sidebar
                    const innerHtml = `
                        <div class="text-sm text-gray-600 flex justify-between items-center mt-1 mb-1">
                            <span>Total Crimes:</span>
                            <span class="font-bold ${crimeCount > 0 ? 'text-red-600' : 'text-gray-400'} ml-3">
                                ${crimeCount.toLocaleString()}
                            </span>
                        </div>
                        ${popHtml}
                        ${incomeHtml}
                        ${povertyHtml}
                        ${unempHtml}
                        ${inequalityHtml}
                        ${riskHtml}
                        ${typesHtml}
                        ${combinedRiskHtml}
                    `;

                    const tooltipContent = `
                        <div class="px-1 min-w-[180px] max-w-[240px]">
                            <div class="font-bold text-gray-800 text-[14px] border-b border-gray-200 pb-1 mb-1.5 uppercase tracking-wide">
                                ${name}
                            </div>
                            ${innerHtml}
                        </div>
                    `;
                    
                    // Bind Hover Tooltip
                    layer.bindTooltip(tooltipContent, {
                        direction: 'top',
                        sticky: true,
                        className: 'bg-white/95 backdrop-blur shadow-2xl rounded-lg border border-gray-100 p-2'
                    });
                    
                    // Map Interaction Handlers
                    layer.on({
                        mouseover: function(e) {
                            if (selectedLayer !== e.target) {
                                const l = e.target;
                                l.setStyle({ weight: 3, color: '#1e293b', fillOpacity: 1 });
                                l.bringToFront();
                            }
                        },
                        mouseout: function(e) {
                            if (selectedLayer !== e.target) {
                                geojsonLayer.resetStyle(e.target);
                            }
                        },
                        click: function(e) {
                            // Stop map click event from firing and instantly closing the panel
                            isFeatureClicked = true;
                            setTimeout(() => isFeatureClicked = false, 100);
                            
                            if (e.originalEvent) {
                                L.DomEvent.stopPropagation(e.originalEvent);
                            }

                            // Populate Right Info Panel
                            document.getElementById('infoPanelTitle').textContent = name;
                            document.getElementById('infoPanelContent').innerHTML = innerHtml + interpretationHtml;
                            document.getElementById('infoPanel').classList.remove('hidden');

                            // Manage visual selection states
                            if (selectedLayer && selectedLayer !== e.target) {
                                geojsonLayer.resetStyle(selectedLayer);
                            }
                            selectedLayer = e.target;
                            e.target.setStyle({ weight: 4, color: '#2563eb', fillOpacity: 1 });
                            e.target.bringToFront();
                        }
                    });
                }
            }).addTo(map);

            updateLegend(maxCrimes);

            // Bring patrol routes above heatmap
            if (patrolLayerGroup) {
                patrolLayerGroup.eachLayer(l => l.bringToFront());
            }
            renderChart();
        }

        function updateLegend(maxCrimes) {
            const container = document.getElementById('legendContainer');
            
            if (currentLayer === 'risk') {
                container.classList.remove('hidden');
                let html = '<h4 class="font-bold text-xs uppercase tracking-wider text-gray-500 mb-3 border-b pb-1">Overall Area Risk</h4><div class="space-y-1.5 text-xs text-gray-700">';
                
                const bands = [
                    { label: '8 - 10 (Very High)', color: '#991b1b' },
                    { label: '6 - 8 (High)', color: '#ef4444' },
                    { label: '4 - 6 (Medium)', color: '#f97316' },
                    { label: '2 - 4 (Low-Medium)', color: '#eab308' },
                    { label: '0 - 2 (Low)', color: '#22c55e' }
                ];

                bands.forEach(b => {
                    html += `
                    <div class="flex items-center">
                        <span class="legend-color-box shadow-sm" style="background:${b.color}"></span>
                        <span>${b.label}</span>
                    </div>`;
                });
                html += `
                    <div class="flex items-center mt-2 pt-2 border-t border-gray-100">
                        <span class="legend-color-box shadow-sm" style="background:#f8fafc"></span>
                        <span class="text-gray-400">No Data</span>
                    </div>
                </div>`;
                container.innerHTML = html;
                return;
            }

            // Crime Heatmap Legend Below
            if (maxCrimes === 0) {
                container.classList.add('hidden');
                return;
            }
            container.classList.remove('hidden');

            const grades = [
                0, 
                Math.floor(maxCrimes * 0.2), 
                Math.floor(maxCrimes * 0.4), 
                Math.floor(maxCrimes * 0.6), 
                Math.floor(maxCrimes * 0.8)
            ];
            
            let html = '<h4 class="font-bold text-xs uppercase tracking-wider text-gray-500 mb-3 border-b pb-1">Crime Heatmap</h4><div class="space-y-1.5 text-xs text-gray-700">';
            
            for (let i = 0; i < grades.length; i++) {
                const start = grades[i];
                const end = grades[i + 1];
                const colorValue = getCrimeColor(start + 1, maxCrimes);
                
                html += `
                    <div class="flex items-center">
                        <span class="legend-color-box shadow-sm" style="background:${colorValue}"></span>
                        <span>${start.toLocaleString()} ${end ? '&ndash; ' + end.toLocaleString() : '+'}</span>
                    </div>`;
            }
            
            html += `
                <div class="flex items-center mt-2 pt-2 border-t border-gray-100">
                    <span class="legend-color-box shadow-sm" style="background:#f8fafc"></span>
                    <span class="text-gray-400">No Data / 0</span>
                </div>
            </div>`;
            
            container.innerHTML = html;
        }

        // Start App
        init();
    </script>
</body>
</html>
